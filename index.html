  const tOut = clamp(wi / 0.5, 0, 1);            // 1→0 淡出

  const alpha = Math.min(tIn, tOut);

  if (isBossWave) {
    // 全屏压暗红色
    ctx.fillStyle = `rgba(60,0,0,${alpha * 0.55})`;
    ctx.fillRect(0, 0, CONFIG.width, CONFIG.height);

    // 全屏渐进压暗（入场时从右到左）
    const sweepX = CONFIG.width * (1 - clamp((wiMax - wi) / 0.6, 0, 1));
    ctx.fillStyle = `rgba(255,60,40,${alpha * 0.12})`;
    ctx.fillRect(0, 0, sweepX, CONFIG.height);

    // 主标题
    const waveNum = state.waveIndex + 1;
    const title = waveNum === 3 ? 'FINAL WAVE' : `WAVE ${waveNum}`;
    const titleY = CONFIG.height / 2 - 30;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.shadowColor = '#ff3a20';
    ctx.shadowBlur = 40;
    ctx.fillStyle = '#ff4422';
    ctx.font = `bold ${Math.round(72 + (1 - alpha) * 18)}px Georgia, serif`;
    ctx.textAlign = 'center';
    ctx.fillText(title, CONFIG.width / 2, titleY);
    ctx.shadowBlur = 0;

    // 副标题
    const subtitle = waveNum === 3 ? 'THE BOSS AWAKENS' : 'MINIBOSS DETECTED';
    ctx.fillStyle = `rgba(255,200,180,${alpha})`;
    ctx.font = 'bold 22px sans-serif';
    ctx.fillText(subtitle, CONFIG.width / 2, titleY + 42);

    ctx.restore();

  } else {
    // Wave 1：简洁绿色入场
    ctx.fillStyle = `rgba(0,20,10,${alpha * 0.35})`;
    ctx.fillRect(0, 0, CONFIG.width, CONFIG.height);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.shadowColor = '#7aff8e';
    ctx.shadowBlur = 24;
    ctx.fillStyle = '#e8ffe0';
    ctx.font = 'bold 68px Georgia, serif';
    ctx.textAlign = 'center';
    ctx.fillText('WAVE 1', CONFIG.width / 2, CONFIG.height / 2 - 20);
    ctx.fillStyle = 'rgba(200,255,210,0.85)';
    ctx.font = '20px sans-serif';
    ctx.shadowBlur = 0;
    ctx.fillText('Defend the Pure Core', CONFIG.width / 2, CONFIG.height / 2 + 22);
    ctx.restore();
  }
  ctx.textAlign = 'left';
}

function drawMessages() {
  for (const m of state.messages) {
    const a = clamp(m.ttl * 1.5, 0, 1);
    ctx.globalAlpha = a;
    ctx.fillStyle = m.color;
    ctx.font = 'bold 18px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(m.text, CONFIG.width / 2, m.y);
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

function drawShop() {
  if (!state.shopOpen || state.phase !== 'playing') return;

  // 面板背景
  ctx.fillStyle = 'rgba(5, 10, 8, 0.88)';
  ctx.fillRect(160, 60, 880, 510);
  ctx.strokeStyle = '#75b682';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(160, 60, 880, 510);

  // 标题行
  ctx.fillStyle = '#effff1';
  ctx.font = 'bold 26px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.fillText('Field Armory', 600, 98);
  // 金币
  ctx.font = 'bold 15px sans-serif';
  ctx.fillStyle = '#ffd17f';
  drawUiGlyph('coin', 730, 92, 18, '#ffe08b');
  ctx.textAlign = 'left';
  ctx.fillText(`${state.coins}  coins`, 742, 96);

  // 分割线
  ctx.strokeStyle = 'rgba(120,200,140,0.22)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(180, 108); ctx.lineTo(1020, 108); ctx.stroke();

  // ── 武器卡片 ──────────────────────────────────────────────
  const CARD_W = 240, CARD_H = 230;
  const CARD_GAP = 18;
  const CARDS_TOTAL = 3 * CARD_W + 2 * CARD_GAP;
  const CARD_START_X = Math.round((1200 - CARDS_TOTAL) / 2);  // 居中
  const CARD_Y = 122;
  const IMG_H = 108;  // 图片区高度

  // 武器描述标语
  const weaponTagline = {
    firesword: 'Burns through armor. Spread fire.',
    icesword:  'Slows the horde. Control the field.',
    staff:     'Twin bolts. Maximum reach.'
  };
  const weaponTraits = {
    firesword: [
      { icon: 'burst', color: '#ffefc2', label: 'ATK',   value: id => `${CONFIG.weapons[id].dmg}` },
      { icon: 'flameSword', color: '#ff9a57', label: 'BURN',  value: id => `${CONFIG.weapons[id].burn}/s` },
      { icon: 'burst', color: '#aaddff', label: 'RANGE', value: () => 'Splash' }
    ],
    icesword: [
      { icon: 'burst', color: '#ffefc2', label: 'ATK',   value: id => `${CONFIG.weapons[id].dmg}` },
      { icon: 'iceSword', color: '#a8e6ff', label: 'SLOW',  value: id => `${Math.round(CONFIG.weapons[id].slow * 100)}%` },
      { icon: 'burst', color: '#aaddff', label: 'RANGE', value: () => 'Melee+' }
    ],
    staff: [
      { icon: 'burst', color: '#ffefc2', label: 'ATK',   value: id => `${CONFIG.weapons[id].dmg}×2` },
      { icon: 'flameSword', color: '#ff9a57', label: 'BURN',  value: id => `${CONFIG.weapons[id].burn}/s` },
      { icon: 'iceSword', color: '#a8e6ff', label: 'SLOW',  value: id => `${Math.round(CONFIG.weapons[id].slow * 100)}%` }
    ]
  };

  const ids = ['firesword', 'icesword', 'staff'];
  ids.forEach((id, i) => {
    const weapon = CONFIG.weapons[id];
    const x = CARD_START_X + i * (CARD_W + CARD_GAP);
    const y = CARD_Y;
    const owned = state.ownedWeapons.includes(id);
    const affordable = state.coins >= weapon.unlockCost;
    const active = state.currentWeapon === id;
    const pulse = 0.5 + 0.5 * Math.sin(performance.now() * 0.003 + i * 1.2);

    // 卡片底色 + 光晕
    ctx.save();
    if (owned) {
      ctx.shadowColor = weapon.slash;
      ctx.shadowBlur = 16 + pulse * 10;
    } else if (affordable) {
      ctx.shadowColor = `rgba(255,220,80,${0.55 + pulse * 0.4})`;
      ctx.shadowBlur = 14 + pulse * 12;
    }
    ctx.fillStyle = owned
      ? (active ? 'rgba(44,110,58,0.96)' : 'rgba(32,80,44,0.92)')
      : affordable ? 'rgba(46,54,38,0.96)' : 'rgba(24,28,26,0.94)';
    ctx.beginPath();
    ctx.roundRect(x, y, CARD_W, CARD_H, 8);
    ctx.fill();
    ctx.strokeStyle = owned
      ? (active ? '#fff0a2' : weapon.slash)
      : affordable ? `rgba(255,${200 + Math.round(pulse * 55)},80,${0.7 + pulse * 0.28})` : 'rgba(255,255,255,0.10)';
    ctx.lineWidth = active ? 2 : 1.5;
    ctx.beginPath();
    ctx.roundRect(x, y, CARD_W, CARD_H, 8);
    ctx.stroke();
    ctx.restore();

    // 图片区域底色（略深）
    ctx.fillStyle = 'rgba(0,0,0,0.28)';
    ctx.beginPath();
    ctx.roundRect(x + 6, y + 6, CARD_W - 12, IMG_H, 6);
    ctx.fill();

    // 武器图片（放大居中）
    drawWeaponThumb(id, x + 6, y + 6, CARD_W - 12, IMG_H);

    // 武器名
    ctx.fillStyle = owned ? (active ? '#fff8c0' : '#dfffea') : affordable ? '#f0ffe8' : '#b0bab4';
    ctx.font = `bold 15px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(weapon.name, x + CARD_W / 2, y + IMG_H + 22);

    // 标语（斜体小字）
    const tagline = weaponTagline[id] || '';
    ctx.fillStyle = owned ? 'rgba(200,255,220,0.7)' : affordable ? 'rgba(220,240,200,0.6)' : 'rgba(160,170,160,0.5)';
    ctx.font = 'italic 11px sans-serif';
    ctx.fillText(tagline, x + CARD_W / 2, y + IMG_H + 38);

    // 属性行
    const traits = weaponTraits[id] || [];
    const traitY0 = y + IMG_H + 56;
    const traitSpacing = 26;
    ctx.textAlign = 'left';
    traits.forEach((tr, ti) => {
      const ty = traitY0 + ti * traitSpacing;
      drawUiGlyph(tr.icon, x + 20, ty, 14, tr.color);
      ctx.fillStyle = 'rgba(200,220,200,0.7)';
      ctx.font = '11px sans-serif';
      ctx.fillText(tr.label, x + 34, ty + 4);
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 13px sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText(tr.value(id), x + CARD_W - 12, ty + 4);
      ctx.textAlign = 'left';
    });

    // 底部价格/状态横条
    const barY = y + CARD_H - 32;
    ctx.fillStyle = owned
      ? (active ? 'rgba(255,230,80,0.18)' : 'rgba(80,180,100,0.18)')
      : affordable ? 'rgba(255,210,60,0.14)' : 'rgba(60,60,60,0.3)';
    ctx.beginPath();
    ctx.roundRect(x + 6, barY, CARD_W - 12, 26, 5);
    ctx.fill();

    ctx.textAlign = 'center';
    if (owned) {
      ctx.fillStyle = active ? '#fff0a2' : '#9fffb8';
      ctx.font = `bold 13px sans-serif`;
      ctx.fillText(active ? '✦ Equipped' : 'Equip', x + CARD_W / 2, barY + 17);
    } else if (affordable) {
      drawUiGlyph('coin', x + CARD_W / 2 - 28, barY + 13, 14, '#ffe08b');
      ctx.fillStyle = '#ffe08b';
      ctx.font = 'bold 13px sans-serif';
      ctx.fillText(`Buy  ${weapon.unlockCost}`, x + CARD_W / 2 + 6, barY + 17);
    } else {
      ctx.fillStyle = '#888';
      ctx.font = '12px sans-serif';
      drawUiGlyph('coin', x + CARD_W / 2 - 30, barY + 13, 13, '#888');
      ctx.fillText(`${weapon.unlockCost}  Locked`, x + CARD_W / 2 + 4, barY + 17);
    }
    ctx.textAlign = 'left';

    weapon._shopRect = { x, y, w: CARD_W, h: CARD_H };
  });

  // ── 树木升级卡片 ──────────────────────────────────────────
  // 分割线
  ctx.strokeStyle = 'rgba(120,200,140,0.18)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(180, CARD_Y + CARD_H + 18); ctx.lineTo(1020, CARD_Y + CARD_H + 18); ctx.stroke();

  ctx.fillStyle = 'rgba(160,230,170,0.55)';
  ctx.font = 'bold 12px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('ECOLOGY UPGRADES', 196, CARD_Y + CARD_H + 34);

  const treeCards = [
    { id: 'tree2', label: 'Oak Upgrade',      cost: 100, tier: 2,
      traits: ['+50% tree HP', 'x1.5 CO2 absorb', 'x1.2 core heal'] },
    { id: 'tree3', label: 'Sacred Life Tree', cost: 200, tier: 3,
      traits: ['+100% tree HP', 'x2.0 CO2 absorb', 'x1.5 core heal'] }
  ];
  const TC_W = 290, TC_H = 108;
  const TC_Y = CARD_Y + CARD_H + 42;
  const TC_START_X = Math.round((1200 - (2 * TC_W + CARD_GAP)) / 2);

  treeCards.forEach((card, i) => {
    const x = TC_START_X + i * (TC_W + CARD_GAP);
    const y = TC_Y;
    const owned = state.treeTier >= card.tier;
    const affordable = state.coins >= card.cost;
    const pulse2 = 0.5 + 0.5 * Math.sin(performance.now() * 0.003 + i * 2.1 + 0.8);

    ctx.save();
    if (owned) {
      ctx.shadowColor = '#9fe6a2';
      ctx.shadowBlur = 12 + pulse2 * 6;
    } else if (affordable) {
      ctx.shadowColor = `rgba(255,220,80,${0.5 + pulse2 * 0.4})`;
      ctx.shadowBlur = 10 + pulse2 * 12;
    }
    ctx.fillStyle = owned ? 'rgba(42,96,60,0.92)' : affordable ? 'rgba(46,54,38,0.96)' : 'rgba(24,28,26,0.94)';
    ctx.beginPath(); ctx.roundRect(x, y, TC_W, TC_H, 7); ctx.fill();
    ctx.strokeStyle = owned ? '#9fe6a2' : affordable ? `rgba(255,${200 + Math.round(pulse2 * 55)},80,${0.7 + pulse2 * 0.28})` : 'rgba(255,255,255,0.10)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.roundRect(x, y, TC_W, TC_H, 7); ctx.stroke();
    ctx.restore();

    // 图标 + 标题
    drawUiGlyph('seed', x + 24, y + 22, 22, owned ? '#c0ffcc' : '#9fe6a2');
    ctx.fillStyle = owned ? '#d0ffdc' : affordable ? '#efffef' : '#90a898';
    ctx.font = 'bold 15px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(card.label, x + 42, y + 26);

    // 三条特性
    card.traits.forEach((t, ti) => {
      ctx.fillStyle = owned ? 'rgba(200,255,215,0.8)' : affordable ? 'rgba(210,240,200,0.7)' : 'rgba(150,160,150,0.55)';
      ctx.font = '12px sans-serif';
      ctx.fillText(`• ${t}`, x + 18, y + 48 + ti * 17);
    });

    // 价格/状态
    ctx.textAlign = 'right';
    if (owned) {
      ctx.fillStyle = '#9fe6a2';

function drawVictory(dt) {
  state.victoryTimer += dt;
  drawBackground();
  drawTrees();
  drawCore();
  drawHero();
  drawParticles();
  ctx.fillStyle = `rgba(255,255,255,${clamp(state.victoryTimer / 3, 0, 0.1)})`;
  ctx.fillRect(0, 0, CONFIG.width, CONFIG.height);

  // Initial fanfare (first 3 seconds)
  if (state.victoryTimer < 3) {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.28)';
    ctx.fillRect(0, 0, CONFIG.width, CONFIG.height);
    ctx.fillStyle = '#efffc5';
    ctx.font = 'bold 76px Georgia, serif';
    ctx.textAlign = 'center';
    ctx.fillText('Victory!', 600, 230);
    ctx.font = '20px Georgia, serif';
    ctx.fillStyle = '#f5ffe3';
    ctx.fillText('The polluted factory frontier is being reclaimed.', 600, 278);
    ctx.textAlign = 'left';
    return;
  }

  const wrongs = state.wrongAnswers;
  const hasWrongs = wrongs.length > 0;

  // Layout: left panel = stats, right panel = eco review (if any wrongs)
  const panelY = 80, panelH = 490;
  const leftX = hasWrongs ? 30  : 330;
  const leftW = hasWrongs ? 330 : 540;
  const rightX = 380, rightW = 790;

  // ── Left panel: game stats ────────────────────────────────────────────────
  ctx.fillStyle = 'rgba(4, 10, 6, 0.82)';
  ctx.beginPath();
  ctx.roundRect(leftX, panelY, leftW, panelH, 14);
  ctx.fill();
  ctx.strokeStyle = '#7adb9a';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Victory title
  ctx.textAlign = 'center';
  ctx.fillStyle = '#d8ffb0';
  ctx.font = 'bold 44px Georgia, serif';
  ctx.fillText('Victory!', leftX + leftW / 2, panelY + 58);

  ctx.fillStyle = '#a8ddb5';
  ctx.font = '14px Georgia, serif';
  ctx.fillText('The factory is reclaimed.', leftX + leftW / 2, panelY + 82);

  // Divider
  ctx.strokeStyle = 'rgba(122,219,154,0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(leftX + 20, panelY + 98); ctx.lineTo(leftX + leftW - 20, panelY + 98);
  ctx.stroke();

  // Stats
  const stats = [
    ['Waves Cleared',    `${CONFIG.waves.length} / ${CONFIG.waves.length}`],
    ['Enemies Defeated', `${state.kills}`],
    ['Coins Collected',  `${state.coins}`],
    ['CO₂ Absorbed',     `${state.stats.co2.toFixed(0)} kg`],
    ['Toxin Cleared',    `${state.stats.toxin.toFixed(0)} u`],
    ['Quiz Score',       `${state.wrongAnswers.length === 0 && state.quizState === null
                           ? 'Perfect!' : `${wrongs.length} miss${wrongs.length !== 1 ? 'es' : ''}`}`]
  ];
  ctx.font = '16px Georgia, serif';
  stats.forEach(([label, value], i) => {
    const sy = panelY + 128 + i * 38;
    ctx.textAlign = 'left';
    ctx.fillStyle = '#7aba8a';
    ctx.fillText(label, leftX + 24, sy);
    ctx.textAlign = 'right';
    ctx.fillStyle = '#e8ffee';
    ctx.fillText(value, leftX + leftW - 24, sy);
  });

  // Play Again button
  const btnX = leftX + leftW / 2 - 90, btnY = panelY + panelH - 70;
  ctx.beginPath();
  ctx.roundRect(btnX, btnY, 180, 48, 10);
  ctx.fillStyle = '#1c8c4d';
  ctx.fill();
  ctx.strokeStyle = '#b0ffd0';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 20px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.fillText('Play Again', leftX + leftW / 2, btnY + 31);
  // Store button rect for click detection
  state._victoryBtnRect = { x: btnX, y: btnY, w: 180, h: 48 };

  // ── Right panel: eco knowledge review ────────────────────────────────────
  if (!hasWrongs) { ctx.textAlign = 'left'; return; }

  ctx.fillStyle = 'rgba(4, 10, 6, 0.82)';
  ctx.beginPath();
  ctx.roundRect(rightX, panelY, rightW, panelH, 14);
  ctx.fill();
  ctx.strokeStyle = '#e8a050';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Header
  ctx.beginPath();
  ctx.roundRect(rightX, panelY, rightW, 46, [14, 14, 0, 0]);
  ctx.fillStyle = 'rgba(80,42,10,0.9)';
  ctx.fill();
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffd090';
  ctx.font = 'bold 17px Georgia, serif';
  ctx.fillText('📚  Eco Knowledge Review  — Questions You Missed', rightX + rightW / 2, panelY + 30);

  // Divider
  ctx.strokeStyle = 'rgba(232,160,80,0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(rightX + 16, panelY + 48); ctx.lineTo(rightX + rightW - 16, panelY + 48);
  ctx.stroke();

  // Each wrong answer
  const maxShow = Math.min(wrongs.length, 4); // cap at 4 to fit panel
  const itemH = (panelH - 60) / maxShow;

  wrongs.slice(0, maxShow).forEach((w, i) => {
    const iy = panelY + 56 + i * itemH;
    const lx = rightX + 20;
    const maxTw = rightW - 40;

    // Question
    ctx.textAlign = 'left';
    ctx.fillStyle = '#f0e8d0';
    ctx.font = `bold 14px Georgia, serif`;
    wrapTextLeft(ctx, `Q: ${w.text}`, lx, iy, maxTw, 18);

    // Correct answer highlight
    ctx.fillStyle = '#7ef09a';
    ctx.font = `bold 14px Georgia, serif`;
    const ansY = iy + 36;
    ctx.fillText(`✓  ${w.correctOption}`, lx, ansY);

    // Explanation
    ctx.fillStyle = '#96bea0';
    ctx.font = `13px Georgia, serif`;
    wrapTextLeft(ctx, w.explanation, lx, ansY + 18, maxTw, 16);

    // Separator
    if (i < maxShow - 1) {
      ctx.strokeStyle = 'rgba(232,160,80,0.2)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(rightX + 16, iy + itemH - 4); ctx.lineTo(rightX + rightW - 16, iy + itemH - 4);
      ctx.stroke();
    }
  });

  // If more wrongs than shown
  if (wrongs.length > maxShow) {
    ctx.textAlign = 'center';
    ctx.fillStyle = '#8a7050';
    ctx.font = `13px Georgia, serif`;
    ctx.fillText(`+ ${wrongs.length - maxShow} more missed — keep exploring eco topics!`, rightX + rightW / 2, panelY + panelH - 12);
  }

  ctx.textAlign = 'left';
}

function drawPlaying() {
  const shakeClock = performance.now() * 0.035;
  const shakeX = Math.sin(shakeClock) * state.shake * 12;
  const shakeY = Math.cos(shakeClock * 1.31) * state.shake * 8;
  ctx.save();
  ctx.translate(shakeX, shakeY);
  drawBackground();
  drawSmokeParticles();
  drawTrees();
  drawCore();
  drawSprites();
  drawProjectiles();
  drawEnemies();
  drawHero();
  drawTwisters();
  drawUltPulses();
  drawSlashes();
  drawParticles();
  ctx.restore();
  drawHud();
  drawCharmHud();
  drawMessages();
  drawWaveOverlay();
  drawLoadoutPanel();
  drawShop();
  drawQuizModal();
}

function gameLoop(ts) {
  const rawDt = lastTime ? Math.min((ts - lastTime) / 1000, 0.033) : 0.016;
  lastTime = ts;
  const dt = state.hitStop > 0 ? 0.001 : rawDt;
  ctx.clearRect(0, 0, CONFIG.width, CONFIG.height);

  if (state.phase === 'start') {
    drawStart();
  } else if (state.phase === 'playing') {
    updatePlaying(dt);
    drawPlaying();
  } else if (state.phase === 'gameover') {
    drawGameOver();
  } else if (state.phase === 'victory') {
    updateParticles(dt);
    drawVictory(dt);
  }
  requestAnimationFrame(gameLoop);
}

function clickPoint(evt) {
  const rect = canvas.getBoundingClientRect();
  const sx = CONFIG.width / rect.width;
  const sy = CONFIG.height / rect.height;
  return { x: (evt.clientX - rect.left) * sx, y: (evt.clientY - rect.top) * sy };
}

function handleShopClick(mx, my) {
  const ids = ['firesword', 'icesword', 'staff'];
  for (const id of ids) {
    const weapon = CONFIG.weapons[id];
    const rect = weapon._shopRect;
    if (!rect) continue;
    if (mx > rect.x && mx < rect.x + rect.w && my > rect.y && my < rect.y + rect.h) {
      if (!state.ownedWeapons.includes(id)) {
        if (state.coins >= weapon.unlockCost) {
          state.coins -= weapon.unlockCost;
          state.ownedWeapons.push(id);
          state.currentWeapon = id;
          addMessage(`${weapon.name} unlocked`, weapon.slash);
          sound.play('coin');
        } else {
          addMessage('Not enough coins', '#ffb093');
        }
      } else {
        state.currentWeapon = id;
        addMessage(`${weapon.name} equipped`, '#dfffe1');
      }
      return true;
    }
  }
  const treeCards = [
    { rect: state.tree2Rect, cost: 100, tier: 2, label: 'Oak Upgrade' },
    { rect: state.tree3Rect, cost: 200, tier: 3, label: 'Sacred Life Tree' }
  ];
  for (const card of treeCards) {
    const rect = card.rect;
    if (!rect) continue;
    if (mx > rect.x && mx < rect.x + rect.w && my > rect.y && my < rect.y + rect.h) {
      if (state.treeTier >= card.tier) {
        addMessage(`${card.label} already active`, '#dfffe1');
        return true;
      }
      if (state.coins < card.cost) {
        addMessage('Not enough coins', '#ffb093');
        return true;
      }
      state.coins -= card.cost;
      applyTreeTier(card.tier);
      addMessage(`${card.label} purchased`, '#9fe6a2');
      sound.play('coin');
      return true;
    }
  }
  return false;
}

function handleLoadoutClick(mx, my) {
  const ids = ['sword', 'firesword', 'icesword', 'staff'];
  for (const id of ids) {
    const rect = CONFIG.weapons[id]._loadoutRect;
    if (!rect) continue;
    if (mx > rect.x && mx < rect.x + rect.w && my > rect.y && my < rect.y + rect.h) {
      if (!state.ownedWeapons.includes(id)) {
        addMessage('Weapon is locked', '#ffb093');
        return true;
      }
      state.currentWeapon = id;
      addMessage(`${CONFIG.weapons[id].name} equipped`, CONFIG.weapons[id].slash);
      return true;
    }
  }
  return false;
}

canvas.addEventListener('click', evt => {
  sound.unlock();
  const { x, y } = clickPoint(evt);
  if (state.phase === 'start') {
    resetGame();
    state.phase = 'playing';
    return;
  }
  // Quiz click interception
  if (state.phase === 'playing' && state.quizState && state.quizState.phase === 'asking') {
    const rects = state.quizState._optRects;
    if (rects) {
      for (let i = 0; i < rects.length; i++) {
        const r = rects[i];
        if (r && x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) {
          handleQuizAnswer(i);
          return;
        }
      }
    }
    return; // block other clicks while quiz is asking
  }
  if (state.phase === 'gameover') {
    if (x > 500 && x < 700 && y > 428 && y < 482) {
      resetGame();
      state.phase = 'start';
    }
    return;
  }
  if (state.phase === 'victory') {
    if (state.victoryTimer > 3) {
      const btn = state._victoryBtnRect;
      const hit = btn
        ? x >= btn.x && x <= btn.x + btn.w && y >= btn.y && y <= btn.y + btn.h
        : x > 500 && x < 700 && y > 456 && y < 510; // fallback
      if (hit) {
        sound.stopVictoryMusic();
        resetGame();
        state.phase = 'start';
      }
    }
    return;
  }
  if (state.phase === 'playing') {
    const loadoutRect = state.loadoutButtonRect;
    if (loadoutRect && x > loadoutRect.x && x < loadoutRect.x + loadoutRect.w && y > loadoutRect.y && y < loadoutRect.y + loadoutRect.h) {
      state.loadoutOpen = !state.loadoutOpen;
      if (state.loadoutOpen) state.shopOpen = false;
      return;
    }
    const r = state.shopButtonRect;
    if (r && x > r.x && x < r.x + r.w && y > r.y && y < r.y + r.h) {
      state.shopOpen = !state.shopOpen;
      if (state.shopOpen) state.loadoutOpen = false;
      return;
    }
  }
  if (state.loadoutOpen && handleLoadoutClick(x, y)) return;
  if (state.shopOpen && handleShopClick(x, y)) return;
});

window.addEventListener('keydown', evt => {
  keys[evt.code] = true;
  sound.unlock();
  if (evt.repeat) return;
  if (evt.code === 'KeyF' && state.phase === 'playing') heroPlant();
  if (evt.code === 'KeyJ' && state.phase === 'playing') heroAttack();
  if (evt.code === 'KeyK' && state.phase === 'playing') heroUltimate();
  if (evt.code === 'KeyE' && state.phase === 'playing') activateFreezeField();
  if (evt.code === 'KeyQ' && state.phase === 'playing') {
    state.loadoutOpen = !state.loadoutOpen;
    if (state.loadoutOpen) state.shopOpen = false;
  }
  if (evt.code === 'KeyB' && state.phase === 'playing') {
    state.shopOpen = !state.shopOpen;
    if (state.shopOpen) state.loadoutOpen = false;
  }
  if (evt.code === 'KeyM') sound.toggle();
  if (evt.code === 'Enter' && state.phase === 'start') {
    sound.unlock();
    resetGame();
    state.phase = 'playing';
  }
});

window.addEventListener('keyup', evt => {
  keys[evt.code] = false;
});

sound.init();
resetGame();
state.phase = 'start';
requestAnimationFrame(gameLoop);
</script>
