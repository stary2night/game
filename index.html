  },
  artifact_cleanse_storm: {

    color: '#ffe066',

    apply(state) {
      state.enemies.forEach(e => {
        if (!e.dead && e.hp > 0) {
          e.hp -= 80;
          if (e.hp <= 0) {
            e.dead = true;
            state.coins += CONFIG.enemies[e.type]?.reward ?? 5;
            state.kills += 1;

      });
      // Visual burst
      emitBurst(CONFIG.width / 2, CONFIG.height / 2, '#ffe066', 40);

  },
  artifact_freeze_field: {

    desc: 'Press [E] to freeze all enemies for 5s!',
    // Not auto-applied — stored in state.heldArtifacts and triggered by E key
    apply(state) {
      state.heldArtifacts = state.heldArtifacts || [];
      state.heldArtifacts.push('artifact_freeze_field');
      addMessage('❄ Freeze Field ready — press [E] to use!', '#a0e4ff', 3.0);
    },
    activate(state) {
      state.activeCharms.push({ id: 'artifact_freeze_field', ttl: 5 });
      emitBurst(CONFIG.width / 2, CONFIG.height / 2, '#a0e4ff', 30);
    }
  }

function applyCharm(id) {
  const def = CHARM_DEFS[id];
  if (!def) return;
  def.apply(state);
  if (id !== 'artifact_freeze_field') {
    addMessage(`${def.icon} ${def.label} activated!`, def.color, 2.2);
  }
}

function activateFreezeField() {
  const held = state.heldArtifacts || [];
  const idx = held.indexOf('artifact_freeze_field');
  if (idx === -1) return;
  if (hasCharm('artifact_freeze_field')) return;
  held.splice(idx, 1);
  CHARM_DEFS.artifact_freeze_field.activate(state);
  addMessage('❄ Freeze Field activated! (5s)', '#a0e4ff', 2.2);
}

function updateActiveCharms(dt) {
  state.activeCharms = state.activeCharms.filter(c => {
    c.ttl -= dt;
    return c.ttl > 0;
  });
}

function hasCharm(id) {
  return state.activeCharms.some(c => c.id === id);
}

function shuffledPool(pool) {
  return [...pool].sort(() => Math.random() - 0.5);
}

  state.quizState = {
    configIndex,
    pool: shuffledPool(cfg.pool),  // randomised question order
    qIndex: 0,
    selected: -1,
    phase: 'asking',   // 'waiting' | 'asking' | 'result' | 'done'
    countdownTimer: cfg.duration, // 10s total
    resultTimer: 0,
    doneTimer: 0,
    score: 0,
    answered: 0,
    _optRects: []
  };
  state.shopOpen = false;
  state.loadoutOpen = false;
}

function currentQuizQuestion() {
  const qs = state.quizState;
  if (!qs) return null;
  return qs.pool[qs.qIndex % qs.pool.length];
}

function handleQuizAnswer(optionIndex) {
  const qs = state.quizState;
  if (!qs || qs.phase !== 'asking' || qs.selected !== -1) return;
  qs.selected = optionIndex;
  qs.phase = 'result';
  qs.resultTimer = 1.0; // show result for 1s then auto-advance
  const q = currentQuizQuestion();
  if (optionIndex === q.correct) {
    qs.score += QUIZ_CONFIG[qs.configIndex].pointsPerQ;
  } else {
    state.wrongAnswers.push({
      text: q.text,
      correctOption: q.options[q.correct],
      explanation: q.explanation
    });
  }
  qs.answered += 1;
}

function advanceQuizQuestion() {
  const qs = state.quizState;
  if (!qs) return;
  if (qs.countdownTimer <= 0) {
    finishQuiz();
    return;
  }
  qs.qIndex += 1;
  qs.selected = -1;
  qs.phase = 'asking';
  qs._optRects = [];
}

function finishQuiz() {
  const qs = state.quizState;
  if (!qs) return;
  // If time ran out while a question was on screen and unanswered, record it as wrong
  if (qs.phase === 'asking' && qs.selected === -1) {
    const q = currentQuizQuestion();
    if (q) {
      state.wrongAnswers.push({
        text: q.text,
        correctOption: q.options[q.correct],
        explanation: q.explanation
      });
    }
  }
  qs.phase = 'done';
  qs.doneTimer = 4.0;
  const tiers = SCORE_TIERS_BY_WAVE[qs.configIndex] || SCORE_TIERS_BY_WAVE[0];
  qs.tier = tiers.find(t => qs.score >= t.minScore) || tiers[tiers.length - 1];
}

function updateQuiz(dt) {
  const qs = state.quizState;
  if (!qs) return;

  if (qs.phase === 'asking') {
    qs.countdownTimer -= dt;
    if (qs.countdownTimer <= 0) {
      qs.countdownTimer = 0;
      finishQuiz();
    }
  } else if (qs.phase === 'result') {
    qs.countdownTimer -= dt;
    qs.resultTimer -= dt;
    if (qs.countdownTimer <= 0) { qs.countdownTimer = 0; finishQuiz(); return; }
    if (qs.resultTimer <= 0) advanceQuizQuestion();
  } else if (qs.phase === 'done') {
    qs.doneTimer -= dt;
    if (qs.doneTimer <= 0) {
      const tier = qs.tier || SCORE_TIERS[SCORE_TIERS.length - 1];
      tier.rewards.forEach(id => applyCharm(id));
      state.quizState = null;
      state.waveState = 'break';
      state.waveTimer = CONFIG.breakDuration;
      state.breakPlantHint = true;
    }
  }
}

}

// Helper: wrap long text
function wrapText(ctx, text, cx, y, maxW, lineH) {
  const words = text.split(' ');
  let line = '';
  let lines = [];
  for (const word of words) {
    const test = line + (line ? ' ' : '') + word;
    if (ctx.measureText(test).width > maxW && line) {
      lines.push(line);
      line = word;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  const startY = y - ((lines.length - 1) * lineH) / 2;
  lines.forEach((l, i) => ctx.fillText(l, cx, startY + i * lineH));
}

// Left-aligned word-wrap helper — starts at (lx, y) and flows downward
function wrapTextLeft(ctx, text, lx, y, maxW, lineH) {
  const words = text.split(' ');
  let line = '';
  let lines = [];
  for (const word of words) {
    const test = line + (line ? ' ' : '') + word;
    if (ctx.measureText(test).width > maxW && line) { lines.push(line); line = word; }
    else line = test;
  }
  if (line) lines.push(line);
  lines.forEach((l, i) => ctx.fillText(l, lx, y + i * lineH));
}

  });
  ctx.restore();
}

const keys = {};

const sound = {
  pool: {},
  init() {
    for (const [key, src] of Object.entries(audioFiles)) {
      const a = new Audio(src);
      a.preload = 'auto';
      if (key === 'bgm' || key === 'victoryBgm') {
        a.loop = true;
        a.volume = 0.30;
      } else if (key === 'spawn') {
        a.volume = 0.18;  // 出场音效调低，避免刺耳
      } else {
        a.volume = 0.6;
      }
      this.pool[key] = a;
    }
  },
  unlock() {
    if (state.audioUnlocked) return;
    state.audioUnlocked = true;
    this.playMusic();
  },
  playMusic() {
    if (state.muted) return;
    const bgm = this.pool.bgm;
    if (bgm.paused) bgm.play().catch(() => {});
  },
  playVictoryMusic() {
    if (state.muted) return;
    this.stopMusic();
    const v = this.pool.victoryBgm;
    if (v) { v.currentTime = 0; v.play().catch(() => {}); }
  },
  stopVictoryMusic() {
    const v = this.pool.victoryBgm;
    if (v) { v.pause(); v.currentTime = 0; }
  },
  stopMusic() {
    this.pool.bgm.pause();
    this.pool.bgm.currentTime = 0;
  },
  play(key) {
    if (state.muted) return;
    const base = this.pool[key];
    if (!base) return;
    try {
      const a = base.cloneNode();
      a.volume = base.volume;
      a.play().catch(() => {});
    } catch (err) {
      // ignore
    }
  },
  toggle() {
    state.muted = !state.muted;
    if (state.muted) this.pool.bgm.pause();
    else this.playMusic();
  }
};

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function lerp(a, b, t) { return a + (b - a) * t; }
function dist(ax, ay, bx, by) { return Math.hypot(ax - bx, ay - by); }
function rand(lo, hi) { return lo + Math.random() * (hi - lo); }
function imageReady(img) { return !!(img && img.complete && img.naturalWidth > 0); }

function addMessage(text, color = '#ffffff', ttl = 1.5) {

}

function emitRing(x, y, color, radius, ttl = 0.3) {

function gridCellCenter(col, row) {
  return {
    x: CONFIG.grid.startX + col * CONFIG.grid.cell,
    y: CONFIG.grid.startY + row * CONFIG.grid.cell
  };
}

function nearestGridCell(x, y) {
  let best = null;
  let bestD = Infinity;
  for (let row = 0; row < CONFIG.grid.rows; row++) {
    for (let col = 0; col < CONFIG.grid.cols; col++) {
      const c = gridCellCenter(col, row);
      const d = dist(x, y, c.x, c.y);
      if (d < bestD) {
        bestD = d;
        best = { col, row, x: c.x, y: c.y };
      }
    }
  }
  return best;
}

function treeTierSpec(tier) {
  if (tier >= 3) return { hpSanctuary: 170, hpEnemy: 120, absorb: 2.0, heal: 1.5 };
  if (tier === 2) return { hpSanctuary: 128, hpEnemy: 90, absorb: 1.5, heal: 1.2 };
  return { hpSanctuary: 85, hpEnemy: 60, absorb: 1.0, heal: 1.0 };
}

function createTree(x, y, zone = 'sanctuary') {
  const cell = nearestGridCell(x, y);
  if (!cell) return null;
  const occupied = state.trees.some(t => !t.dead && t.col === cell.col && t.row === cell.row);
  if (occupied) return null;
  const tooClose = state.trees.some(t => !t.dead && dist(cell.x, cell.y, t.x, t.y) < CONFIG.grid.cell * 0.9);
  if (tooClose) return null;
  const spec = treeTierSpec(state.treeTier);
  const baseHp = zone === 'enemy' ? spec.hpEnemy : spec.hpSanctuary;
  const tree = {
    x: cell.x,
    y: cell.y,
    col: cell.col,
    row: cell.row,
    zone,
    hp: baseHp,
    maxHp: baseHp,
    absorb: spec.absorb,
    heal: spec.heal,
    sway: rand(0, Math.PI * 2),
    growScale: 0.08,
    dead: false
  };
  state.trees.push(tree);
  return tree;
}

function applyTreeTier(tier) {
  state.treeTier = clamp(tier, 1, 3);
  const spec = treeTierSpec(state.treeTier);
  for (const tree of state.trees) {
    const nextHp = tree.zone === 'enemy' ? spec.hpEnemy : spec.hpSanctuary;
    const ratio = tree.maxHp > 0 ? tree.hp / tree.maxHp : 1;
    tree.maxHp = nextHp;
    tree.hp = clamp(nextHp * ratio, 1, nextHp);
    tree.absorb = spec.absorb;
    tree.heal = spec.heal;
  }
}

function hasAffordableShopItem() {
  const weaponIds = ['firesword', 'icesword', 'staff'];
  for (const id of weaponIds) {
  const weapon = CONFIG.weapons[id];
    if (!state.ownedWeapons.includes(id) && state.coins >= weapon.unlockCost) return true;
  }
  if (state.treeTier < 2 && state.coins >= 100) return true;
  if (state.treeTier < 3 && state.coins >= 200) return true;
  return false;
}

function randomEmptyGridCell(zone) {
  const candidates = [];
  for (let row = 0; row < CONFIG.grid.rows; row++) {
    for (let col = 0; col < CONFIG.grid.cols; col++) {
      const c = gridCellCenter(col, row);
      if (zone === 'sanctuary' && c.x > CONFIG.sanctuaryEdge) continue;
      if (zone === 'enemy' && c.x <= CONFIG.sanctuaryEdge) continue;
      const occupied = state.trees.some(t => !t.dead && t.col === col && t.row === row);
      const reserved = state.sprites.some(s => s.targetCol === col && s.targetRow === row);
      if (occupied || reserved) continue;

      // Canvas y轴朝下：0度=正右，90度=正下，180度=正左
      // 高地（西北）角度约200-350度，低平空地在0-200度范围
      // 只允许飞向 0-200 度，排除西北高地背后区域
      const angleRad = Math.atan2(c.y - CONFIG.core.y, c.x - CONFIG.core.x);
      const angleDeg = ((angleRad * 180 / Math.PI) + 360) % 360;
      if (angleDeg > 200) continue;

      // y 越大（越靠近地图中低平地）权重越高
      const gridYMin = CONFIG.grid.startY;
      const gridYMax = CONFIG.grid.startY + (CONFIG.grid.rows - 1) * CONFIG.grid.cell;
      const lowlandWeight = 0.3 + 1.4 * ((c.y - gridYMin) / (gridYMax - gridYMin));

      // 周围相邻格有树则强力降权
      let neighborTrees = 0;
      for (const t of state.trees) {
        if (t.dead) continue;
        if (Math.abs(t.col - col) <= 1 && Math.abs(t.row - row) <= 1) neighborTrees++;
      }
      const crowdPenalty = 1 / (1 + neighborTrees * 2.5);

      candidates.push({ col, row, x: c.x, y: c.y, weight: lowlandWeight * crowdPenalty });
    }
  }
  if (candidates.length === 0) return null;

  // 加权随机抽取
  const totalWeight = candidates.reduce((s, c) => s + c.weight, 0);
  let r = Math.random() * totalWeight;
  for (const c of candidates) {
    r -= c.weight;
    if (r <= 0) return c;
  }
  return candidates[candidates.length - 1];
}

function spawnCoreSprite() {
  if (state.sprites.length >= 8) return;
  const target = randomEmptyGridCell('sanctuary');
  if (!target) return;
  state.sprites.push({
    x: CONFIG.core.x,
    y: CONFIG.core.y,
    targetX: target.x,
    targetY: target.y,
    targetCol: target.col,
    targetRow: target.row,
    trail: [],
    done: false
  });
  emitBurst(CONFIG.core.x, CONFIG.core.y, '#a8ffcc', 6, 50, 3);
}

function updateSprites(dt) {
  const coreHpPct = Math.max(0.01, state.core.hp / CONFIG.core.maxHp);
  const spawnInterval = 8.0 / coreHpPct;
  state.coreSpriteTimer -= dt;
  if (state.coreSpriteTimer <= 0) {
    state.coreSpriteTimer = spawnInterval;
    spawnCoreSprite();
  }

  for (const sp of state.sprites) {
    if (sp.done) continue;
    sp.trail.push({ x: sp.x, y: sp.y, ttl: 0.35 });
    const dx = sp.targetX - sp.x;
    const dy = sp.targetY - sp.y;
    const d = Math.hypot(dx, dy);
    const speed = 80;
    if (d < speed * dt + 2) {
      sp.x = sp.targetX;
      sp.y = sp.targetY;
      sp.done = true;
      createTree(sp.x, sp.y, 'sanctuary');
      emitLeaf(sp.x, sp.y - 12);
      sound.play('plant');
    } else {
      sp.x += (dx / d) * speed * dt;
      sp.y += (dy / d) * speed * dt;
    }
    for (const t of sp.trail) t.ttl -= dt;
    sp.trail = sp.trail.filter(t => t.ttl > 0);
  }
  state.sprites = state.sprites.filter(sp => !sp.done);
}

const MAX_POLLUTION_PATCHES = 60;

function addPollution(x, y, toxin, radius, ttl = 18) {
  if (state.pollutions.length >= MAX_POLLUTION_PATCHES) {
    state.pollutions.shift(); // 超限时丢弃最老的
  }
  state.pollutions.push({ x, y, toxin, radius, ttl });
}

function spawnPollutionPatches() {
  state.pollutions = [];
  for (let i = 0; i < 42; i++) {
    state.pollutions.push({
      x: rand(CONFIG.slopeStart - 40, CONFIG.width - 30),
      y: rand(110, 625),
      toxin: rand(0.25, 0.9),
      radius: rand(24, 48),
      ttl: 999 // 初始静态背景 patch 不消失
    });
  }
}

function resetGame() {
  state.hero = {
    x: CONFIG.hero.x,
    y: CONFIG.hero.y,
    hp: CONFIG.hero.maxHp,
    maxHp: CONFIG.hero.maxHp,
    lives: CONFIG.hero.lives,
    isDown: false,
    respawnTimer: 0,
    invuln: 0,
    attackCd: 0,
    plantCd: 0,
    ultCd: 0,
    facing: 1,
    walkTime: 0,
    attackTime: 0,
    ultTime: 0
  };
  state.core.hp = CONFIG.core.maxHp;
  state.enemies = [];
  state.smokeParticles = [];
  state.twisters = [];
  state.ultPulses = [];
  state.projectiles = [];
  state.particles = [];
  state.messages = [];
  state.slashes = [];
  state.waveIndex = -1;
  state.waveState = 'break';
  state.waveTimer = 2.2;
  state.waveQueue = [];
  state.breakPlantHint = true;
  state.victoryTimer = 0;
  state.cleanReveal = 0;
  state.gameOverTip = '';
  state.currentWeapon = 'sword';
  state.ownedWeapons = ['sword'];
  state.coins = 50;
  state.kills = 0;
  state.waveIntro = 0;
  state.treeTier = 1;
  state.stats.co2 = 0;
  state.stats.toxin = 0;
  state.shopOpen = false;
  state.loadoutOpen = false;
  state.sprites = [];
  state.coreSpriteTimer = 3.0;
  state.trees = [];
  state.quizState = null;
  state.activeCharms = [];
  state.heldArtifacts = [];
  state.wrongAnswers = [];
  state.quizPendingTimer = 0;
  state.quizPendingIndex = -1;
  spawnPollutionPatches();
}

function openNextWave() {
  state.waveIndex += 1;
  if (state.waveIndex >= CONFIG.waves.length) {
    state.waveState = 'victoryCheck';
    return;
  }
  state.waveState = 'fighting';
  state.breakPlantHint = false;
  const isBossWave = state.waveIndex >= 1;
  state.waveIntro = isBossWave ? 3.2 : 2.0;
  state.waveIntroMax = state.waveIntro;
  const wave = CONFIG.waves[state.waveIndex];
  state.waveQueue = [];
  for (const [type, count] of Object.entries(wave)) {
    for (let i = 0; i < count; i++) state.waveQueue.push(type);
  }
  state.waveQueue.sort(() => Math.random() - 0.5);
  state.waveSpawnGap = 0.8;
  state.waveSpawnTimer = isBossWave ? 3.8 : 1.25;
  if (isBossWave) {
    punch(0.38, 0.06);
    for (let i = 0; i < 3; i++) setTimeout(() => punch(0.22, 0.03), i * 280);
  } else {
    punch(0.22, 0.018);
  }
  sound.play('spawn');
  if (state.waveIndex === 2) {
    if (!state.ownedWeapons.includes('firesword')) state.ownedWeapons.push('firesword');
    state.currentWeapon = 'firesword';
  }
}

function spawnEnemy(type) {
  const options = [
    { x: 1135, y: 282, kind: 'factory' },
    { x: 1040, y: 396, kind: 'factory' },
    { x: 1084, y: 470, kind: 'drain' },
    { x: 1128, y: 518, kind: 'drain' }
  ];
  const point = options[Math.floor(Math.random() * options.length)];
  const cfg = CONFIG.enemy[type];
  state.enemies.push({
    type,
    x: point.x + rand(-10, 10),
    y: point.y + rand(-10, 10),
    hp: cfg.hp,
    maxHp: cfg.hp,
    speed: cfg.speed,
    damage: cfg.damage,
    reward: cfg.reward,
    radius: cfg.radius,
    range: cfg.range,
    attackCd: 0,
    gait: rand(0, Math.PI * 2),
    burn: 0,
    slow: 0,
    dead: false,
    poisonTimer: 0
  });
  emitBurst(point.x, point.y, point.kind === 'drain' ? '#7cff6e' : '#d087ff', 14, 70, 5);
  sound.play('spawn');
}

function damageHero(amount) {
  const hero = state.hero;
  if (hero.isDown || hero.invuln > 0) return;
  hero.hp = Math.max(0, hero.hp - amount);
  hero.invuln = 0.45;
  punch(0.1, 0.02);
  emitBurst(hero.x, hero.y - 20, '#ffd4d4', 8, 80, 4);
  emitRing(hero.x, hero.y - 56, '#ff9e9e', 26, 0.14);
  sound.play('heroHit');
  if (hero.hp <= 0) {
    hero.isDown = true;
    hero.respawnTimer = CONFIG.hero.respawn;
    hero.lives -= 1;
    addMessage(hero.lives > 0 ? 'Hero down. Respawn in 3s' : 'No lives left', '#ff9a9a', 2);
  }
}

function damageCore(amount) {
  if (hasCharm('charm_purify_shield')) amount *= 0.7;
  if (hasCharm('charm_core_shield')) amount *= 0.5;
  state.core.hp = Math.max(0, state.core.hp - amount);
  punch(0.14, 0.04);
  emitBurst(CONFIG.core.x, CONFIG.core.y - 8, '#9fffd8', 10, 95, 5);
  emitRing(CONFIG.core.x, CONFIG.core.y, '#9fffd8', 54, 0.18);
  sound.play('coreHit');
  if (state.core.hp <= 0) {
    state.gameOverTip = 'The Pure Core has been consumed by pollution.';
    state.phase = 'gameover';
    sound.play('gameover');
  }
}

function damageEnemy(enemy, amount, effect = null, quiet = false) {
  if (enemy.dead) return;
  enemy.hp = Math.max(0, enemy.hp - amount);
  if (!quiet) {
    enemy.hitFlash = 0.06;
    enemy.hitSquash = Math.min(0.03, 0.012 + amount / 2200);
  }
  if (effect) {
    if (effect.burn) enemy.burn = Math.max(enemy.burn, 2.8);
    if (effect.slow) enemy.slow = Math.max(enemy.slow, 2.2);
  }
  if (!quiet) {
    punch(amount > 120 ? 0.035 : 0.02, amount > 120 ? 0.01 : 0.006);
    emitBurst(enemy.x, enemy.y - enemy.radius * 0.5, '#ffffff', amount > 60 ? 4 : 3, 42, 2.1);
    sound.play('enemyHit');
  }
  if (enemy.hp <= 0) {
    enemy.dead = true;
    state.coins += enemy.reward;
    state.kills += 1;
    if (!quiet || enemy.type === 'boss' || enemy.type === 'miniboss') {
      emitBurst(enemy.x, enemy.y, enemy.type === 'boss' ? '#b67cff' : '#ffd48f', enemy.type === 'boss' ? 14 : 7, 92, enemy.type === 'boss' ? 5 : 3);
      emitRing(enemy.x, enemy.y, enemy.type === 'boss' ? '#c08bff' : '#ffc86a', enemy.type === 'boss' ? 80 : 34, 0.26);
    }
    if (!quiet || enemy.type === 'boss' || enemy.type === 'miniboss') sound.play('enemyDown');
    if (!quiet) sound.play('coin');
  }
}

function heroAttack() {
  const hero = state.hero;
  if (hero.isDown || hero.attackCd > 0) return;
  const weapon = CONFIG.weapons[state.currentWeapon];
  hero.attackCd = CONFIG.hero.attackCd;
  hero.attackTime = 0.22;
  sound.play('skill');
  emitBurst(hero.x + hero.facing * 44, hero.y - 70, weapon.slash, 4, 56, 2.6);
  emitSlash(hero.x + hero.facing * 42, hero.y - 70, hero.facing, weapon.slash, 60);
  for (const enemy of state.enemies) {
    if (enemy.dead) continue;
    const reach = weapon.meleeRange + enemy.radius + 10;
    if (dist(hero.x + hero.facing * 18, hero.y - 70, enemy.x, enemy.y - enemy.radius * 0.5) <= reach) {
      damageEnemy(enemy, weapon.dmg, weapon);
    }
  }
}

function heroUltimate() {
  const hero = state.hero;
  if (hero.isDown || hero.ultCd > 0) return;
  if (hero.hp / hero.maxHp < 0.6) {
    addMessage('Ultimate needs at least 60% HP', '#ffb4a2');
    return;
  }
  if (hero.dashing) return;
  hero.ultCd = CONFIG.hero.ultCd;
  hero.ultTime = 0.55;

  // 冲刺参数：沿facing方向冲刺280px，耗时0.18s
  const dashDist = 280;
  const dashDuration = 0.18;
  hero.dashing = true;
  hero.dashStartX = hero.x;
  hero.dashStartY = hero.y;
  hero.dashTargetX = clamp(hero.x + hero.facing * dashDist, 80, CONFIG.width - 65);
  hero.dashTargetY = hero.y;
  hero.dashTimer = dashDuration;
  hero.dashDuration = dashDuration;
  hero.dashTrail = [];
  hero.dashHit = new Set();

  // 起手特效
  emitBurst(hero.x, hero.y - 50, '#a8ffc8', 10, 80, 3);
  emitRing(hero.x, hero.y - 50, '#ccffe8', 22, 0.12);
  state.shake = Math.max(state.shake, 0.08);
  sound.play('ultimate');
}

function updateUltPulses(dt) {
  const hero = state.hero;
  if (!hero || !hero.dashing) {
    // 推进净化动画计时
    for (const enemy of state.enemies) {
      if (!enemy.purifying) continue;
      enemy.purifyTimer -= dt;
      if (enemy.purifyTimer <= 0) enemy.purifying = false;
    }
    return;
  }

  hero.dashTimer -= dt;
  const progress = clamp(1 - hero.dashTimer / hero.dashDuration, 0, 1);
  // easeOut：前半段快，后半段缓停
  const ease = 1 - Math.pow(1 - progress, 2.5);

  hero.x = lerp(hero.dashStartX, hero.dashTargetX, ease);
  hero.y = lerp(hero.dashStartY, hero.dashTargetY, ease);

  // 残影轨迹
  hero.dashTrail.push({ x: hero.x, y: hero.y, ttl: 0.22, maxTtl: 0.22 });
  for (const t of hero.dashTrail) t.ttl -= dt;
  hero.dashTrail = hero.dashTrail.filter(t => t.ttl > 0);

  // 冲刺路径上的碰撞检测，杀伤宽度约50px（仅正前方窄条）
  const hitWidth = 50;
  for (const enemy of state.enemies) {
    if (enemy.dead || hero.dashHit.has(enemy)) continue;
    const ex = enemy.x, ey = enemy.y - enemy.radius * 0.4;
    // 敌人到冲刺路径线段的垂直距离
    const alongX = hero.dashTargetX - hero.dashStartX;
    const toEx = ex - hero.dashStartX;
    const toEy = ey - hero.dashStartY;
    const projLen = Math.hypot(alongX, 0);
    const proj = projLen > 0 ? (toEx * alongX) / (projLen * projLen) : 0;
    const closestX = hero.dashStartX + clamp(proj, 0, 1) * alongX;
    const closestY = hero.dashStartY;
    const perpDist = dist(ex, ey, closestX, closestY);

    if (perpDist > hitWidth + enemy.radius) continue;
    // 只打已经被英雄"经过"的位置
    const passedX = hero.facing > 0 ? ex <= hero.x + 10 : ex >= hero.x - 10;
    if (!passedX) continue;

    hero.dashHit.add(enemy);
    const dmg = enemy.type === 'boss' ? 170 : enemy.type === 'miniboss' ? 230 : 9999;
    const lethal = enemy.hp <= dmg;

    enemy.purifying = true;
    enemy.purifyTimer = lethal ? 0.65 : 0.25;
    enemy.purifyLethal = lethal;

    // 净化粒子
    for (let i = 0; i < (lethal ? 16 : 7); i++) {
      const a = rand(-Math.PI, Math.PI);
      const s = rand(40, lethal ? 120 : 70);
      state.particles.push({
        x: ex + rand(-enemy.radius * 0.5, enemy.radius * 0.5),
        y: ey - rand(0, enemy.radius * 0.5),
        vx: Math.cos(a) * s * 0.5,
        vy: Math.sin(a) * s - rand(20, 60),
        ttl: rand(0.4, lethal ? 1.0 : 0.6),
        size: rand(2, lethal ? 4.5 : 3),
        color: lethal ? '#a8ffc8' : '#6effa8'
      });
    }
    if (lethal) {
      emitRing(ex, ey, '#a8ffc8', enemy.radius * 1.8, 0.4);
      punch(0.05, 0.008);
    }

    // 延迟实际扣血，让溶解动画先播
    const delay = lethal ? 600 : 220;
    setTimeout(() => { if (!enemy.dead) damageEnemy(enemy, dmg, null, false); }, delay);
    if (lethal) setTimeout(() => sound.play('enemyDown'), delay + 50);
  }

  // 冲刺结束
  if (hero.dashTimer <= 0) {
    hero.dashing = false;
    hero.dashTrail = [];
    hero.x = hero.dashTargetX;
    hero.y = hero.dashTargetY;
    // 落点特效
    emitBurst(hero.x, hero.y - 50, '#a8ffc8', 12, 90, 3.5);
    emitSlash(hero.x + hero.facing * 30, hero.y - 60, hero.facing, '#a8ffc8', 80);
    state.shake = Math.max(state.shake, 0.1);
  }

  // 净化计时推进
  for (const enemy of state.enemies) {
    if (!enemy.purifying) continue;
    enemy.purifyTimer -= dt;
    if (enemy.purifyTimer <= 0) enemy.purifying = false;
  }
}

function heroPlant() {
  const hero = state.hero;
  if (hero.isDown || hero.plantCd > 0) return;
  const zone = hero.x > CONFIG.slopeStart ? 'enemy' : 'sanctuary';
  const tree = createTree(hero.x, hero.y, zone);
  if (!tree) {
    addMessage('No planting slot here', '#ffcf9b');
    return;
  }
  hero.plantCd = CONFIG.hero.plantCd;
  emitLeaf(tree.x, tree.y - 12);
  sound.play('plant');
  addMessage(zone === 'enemy' ? 'Purification tree planted' : 'Sanctuary tree planted', '#9bffac');
}

function nearestTreeTarget(x, y) {
  let best = null;
  let bestD = Infinity;
  for (const tree of state.trees) {
    if (tree.dead) continue;
    const d = dist(x, y, tree.x, tree.y);
    if (d < bestD) {
      bestD = d;
      best = tree;
    }
  }
  return best;
}

function updateHero(dt) {
  const hero = state.hero;
  if (hero.invuln > 0) hero.invuln -= dt;
  hero.attackCd = Math.max(0, hero.attackCd - dt);
  hero.plantCd = Math.max(0, hero.plantCd - dt);
  hero.ultCd = Math.max(0, hero.ultCd - dt);
  hero.attackTime = Math.max(0, hero.attackTime - dt);
  hero.ultTime = Math.max(0, hero.ultTime - dt);
  if (hero.isDown) {
    if (hero.lives <= 0) {
      state.phase = 'gameover';
      state.gameOverTip = 'The hero fell before the land could recover.';
      sound.play('gameover');
      return;
    }
    hero.respawnTimer -= dt;
    if (hero.respawnTimer <= 0) {
      hero.isDown = false;
      hero.hp = hero.maxHp;
      hero.x = CONFIG.hero.x;
      hero.y = CONFIG.hero.y;
      hero.invuln = 1.2;
      addMessage('Hero revived', '#d8ffb3');
    }
    return;
  }

  let dx = 0;
  let dy = 0;
  if (keys['KeyA'] || keys['ArrowLeft']) dx -= 1;
  if (keys['KeyD'] || keys['ArrowRight']) dx += 1;
  if (keys['KeyW'] || keys['ArrowUp']) dy -= 1;
  if (keys['KeyS'] || keys['ArrowDown']) dy += 1;
  const moving = dx !== 0 || dy !== 0;
  if (moving) {
    const len = Math.hypot(dx, dy);
    dx /= len;
    dy /= len;
    let slopeSpeed = 1;
    if (hero.x > CONFIG.sanctuaryEdge) slopeSpeed = lerp(1, 0.72, clamp((hero.x - CONFIG.sanctuaryEdge) / 260, 0, 1));
    if (hero.x > CONFIG.slopeStart) slopeSpeed = 0.92;
    hero.x = clamp(hero.x + dx * CONFIG.hero.speed * slopeSpeed * dt, 70, CONFIG.width - 65);
    hero.y = clamp(hero.y + dy * CONFIG.hero.speed * dt, 120, CONFIG.height - 38);
    hero.walkTime += dt * 10;
    hero.facing = dx < 0 ? -1 : dx > 0 ? 1 : hero.facing;
  }
  if (state.waveIntro > 0) {
    state.waveIntro = Math.max(0, state.waveIntro - dt);
    state.shake = Math.max(state.shake, 0.04 + state.waveIntro * 0.08);
  }
}

function updateTrees(dt) {
  for (const tree of state.trees) {
    if (tree.dead) continue;
    tree.sway += dt * 2;
    if (tree.growScale < 1) tree.growScale = Math.min(1, tree.growScale + dt * 0.18);
    const polluted = tree.zone === 'enemy';
    if (polluted) {
      for (const patch of state.pollutions) {
        const d = dist(tree.x, tree.y, patch.x, patch.y);
        if (d < patch.radius + 50 && patch.toxin > 0) {
          const take = Math.min(patch.toxin, dt * 0.12 * (tree.absorb || 1));
          patch.toxin -= take;
          state.stats.toxin += take * 40;
        }
      }
    } else {
      state.stats.co2 += dt * 1.5 * (tree.absorb || 1);
      state.core.hp = clamp(state.core.hp + dt * 0.16 * (tree.heal || 1), 0, CONFIG.core.maxHp);
    }
  }
}

function updateEnemies(dt) {
  const freezeActive = hasCharm('artifact_freeze_field');
  for (const enemy of state.enemies) {
    if (enemy.dead) continue;
    if (freezeActive) {
      enemy.frozen = true;
      continue; // skip all movement and attacks while frozen
    }
    enemy.frozen = false;
    enemy.hitFlash = Math.max(0, (enemy.hitFlash || 0) - dt);
    enemy.hitSquash = Math.max(0, (enemy.hitSquash || 0) - dt * 1.8);
    enemy.gait += dt * (enemy.type === 'boss' ? 4 : enemy.type === 'miniboss' ? 5 : 7);
    enemy.attackCd = Math.max(0, enemy.attackCd - dt);
    if (enemy.burn > 0) {
      enemy.burn -= dt;
      damageEnemy(enemy, dt * 9, null, true);
    }
    if (enemy.slow > 0) enemy.slow -= dt;

    let target = nearestTreeTarget(enemy.x, enemy.y);
    if (!target) target = { x: CONFIG.core.x, y: CONFIG.core.y, isCore: true };
    const tx = target.x;
    const ty = target.y;
    const d = dist(enemy.x, enemy.y, tx, ty);
    const slopePenalty = enemy.x < CONFIG.slopeStart ? lerp(1, 0.35, clamp((CONFIG.slopeStart - enemy.x) / 360, 0, 1)) : 1;
    const slowPenalty = enemy.slow > 0 ? 0.65 : 1;
    const moveSpeed = enemy.speed * slopePenalty * slowPenalty;

    if (d > enemy.range) {
      const nx = (tx - enemy.x) / d;
      const ny = (ty - enemy.y) / d;
      enemy.x += nx * moveSpeed * dt;
      enemy.y += ny * moveSpeed * dt;
    } else if (enemy.attackCd <= 0) {
      enemy.attackCd = CONFIG.enemy[enemy.type].attackCd;
      if (target.isCore) {
        damageCore(enemy.damage);
      } else if (!target.dead) {
        const dmg = hasCharm('charm_purify_shield') ? enemy.damage * 0.7 : enemy.damage;
        target.hp = Math.max(0, target.hp - dmg);
        emitBurst(target.x, target.y - 35, '#c4d589', 10, 70, 4);
        if (target.hp <= 0) target.dead = true;
      }
    }

    if (enemy.type === 'skull') {
      enemy.poisonTimer += dt;
      if (enemy.poisonTimer > 1.8) {
        enemy.poisonTimer = 0;
        // 找最近目标（树木优先，其次英雄）
        let skullTarget = null;
        let skullDist = Infinity;
        for (const tree of state.trees) {
          if (tree.dead) continue;
          const d = dist(enemy.x, enemy.y, tree.x, tree.y);
          if (d < skullDist) { skullDist = d; skullTarget = { x: tree.x, y: tree.y - 20, isTree: true, tree }; }
        }
        if (!state.hero.isDown) {
          const hd = dist(enemy.x, enemy.y, state.hero.x, state.hero.y - 40);
          if (!skullTarget || hd < skullDist * 0.7) {
            skullTarget = { x: state.hero.x, y: state.hero.y - 40, isHero: true };
          }
        }
        if (skullTarget) {
          const dx = skullTarget.x - enemy.x;
          const dy = skullTarget.y - enemy.y;
          const d = Math.hypot(dx, dy) || 1;
          const spd = 140;
          state.projectiles.push({
            x: enemy.x, y: enemy.y - 10,
            vx: (dx / d) * spd, vy: (dy / d) * spd,
            radius: 7, dmg: enemy.damage,
            ttl: 2.2,
            color: '#7cff6e',
            isPoison: true,
            effect: null
          });
          // 发射时吐出烟雾特效
          for (let i = 0; i < 4; i++) {
            state.smokeParticles.push({
              x: enemy.x + rand(-8, 8), y: enemy.y - 14,
              vx: rand(-10, 10), vy: rand(-20, -8),
              size: rand(5, 10), alpha: 0.4, ttl: 0.6,
              grow: 0.5, color: '90,160,50'
            });
          }
        }
      }
    }

    // miniboss 大招：释放紫色旋风粒子群
    if (enemy.type === 'miniboss') {
      enemy.abilityCd = (enemy.abilityCd || 0) - dt;
      if (enemy.abilityCd <= 0) {
        enemy.abilityCd = 3.5;
        punch(0.08, 0.015);
        emitBurst(enemy.x, enemy.y - enemy.radius * 0.5, '#cc66ff', 10, 80, 3.5);
        emitRing(enemy.x, enemy.y - enemy.radius * 0.5, '#dd88ff', 50, 0.22);
        // 释放 5-7 颗旋风，向随机方向漂移扩散
        const count = Math.floor(rand(10, 15));
        for (let i = 0; i < count; i++) {
          const angle = rand(0, Math.PI * 2);
          const spd = rand(90, 200);
          state.twisters.push({
            x: enemy.x + rand(-18, 18),
            y: enemy.y - enemy.radius * 0.4,
            vx: Math.cos(angle) * spd,
            vy: Math.sin(angle) * spd - 30,
            spin: rand(0, Math.PI * 2),
            spinSpeed: rand(4, 9) * (Math.random() < 0.5 ? 1 : -1),
            radius: rand(14, 22),
            ttl: rand(2.2, 3.6),
            dmgTimer: 0,
            alpha: 0.85
          });
        }
        addMessage('Miniboss: Vortex Release!', '#cc66ff', 1.2);
        sound.play('skill');
      }
    }

    // boss 大招：两种交替
    if (enemy.type === 'boss') {
      enemy.abilityCd = (enemy.abilityCd || 0) - dt;
      enemy.abilityPhase = enemy.abilityPhase || 0;
      if (enemy.abilityCd <= 0) {
        enemy.abilityPhase = (enemy.abilityPhase + 1) % 2;

        if (enemy.abilityPhase === 0) {
          // 大招A：全场废气弹幕，向8个方向射出毒气弹
          enemy.abilityCd = 7.0;
          emitBurst(enemy.x, enemy.y - enemy.radius, '#9933cc', 20, 110, 5);
          emitRing(enemy.x, enemy.y - enemy.radius, '#7700aa', 70, 0.3);
          punch(0.16, 0.04);
          const count = 8;
          for (let i = 0; i < count; i++) {
            const angle = (i / count) * Math.PI * 2;
            state.projectiles.push({
              x: enemy.x, y: enemy.y - enemy.radius * 0.6,
              vx: Math.cos(angle) * 160, vy: Math.sin(angle) * 160,
              radius: 9, dmg: 22,
              ttl: 2.8,
              color: '#aa44dd',
              isPoison: true,
              effect: null
            });
          }
          addMessage('BOSS: Pollution Barrage!', '#cc66ff', 1.5);
          sound.play('spawn');
        } else {
          // 大招B：地面污染爆破
          enemy.abilityCd = 9.0;
          const liveTrees = state.trees.filter(t => !t.dead);
          const targets = liveTrees.sort(() => Math.random() - 0.5).slice(0, 3);
          const points = targets.length > 0
            ? targets.map((t, i) => ({ x: t.x + rand(-24, 24), y: t.y + rand(-12, 12), delay: i * 650 }))
            : [{ x: CONFIG.core.x + rand(-60, 60), y: CONFIG.core.y + rand(-30, 60), delay: 0 }];

          for (const pt of points) {
            setTimeout(() => {
              const bx = pt.x, by = pt.y;
              const blastR = 70;

              // 多层爆炸环：由内到外
              emitRing(bx, by, '#ffffff', 20, 0.10);
              emitRing(bx, by, '#ff6600', 45, 0.20);
              emitRing(bx, by, '#dd3300', 70, 0.30);
              emitRing(bx, by, '#882200', 100, 0.40);

              // 中心白闪
              emitBurst(bx, by, '#ffffff', 10, 60, 5);
              // 橙红碎片向外喷射
              emitBurst(bx, by, '#ff6600', 22, 130, 4.5);
              emitBurst(bx, by, '#dd4400', 16, 90, 3.5);
              // 黑色烟雾碎片
              for (let i = 0; i < 8; i++) {
                const a = rand(0, Math.PI * 2);
                const s = rand(50, 110);
                state.smokeParticles.push({
                  x: bx, y: by,
                  vx: Math.cos(a) * s, vy: Math.sin(a) * s - 40,
                  size: rand(12, 24), alpha: rand(0.5, 0.75),
                  ttl: rand(1.0, 2.0), grow: rand(0.8, 1.6),
                  color: '40,28,18'
                });
              }
              // 落地污染残留（有生命周期，不永久堆积）
              for (let i = 0; i < 3; i++) {
                addPollution(
                  bx + rand(-blastR * 0.6, blastR * 0.6),
                  by + rand(-blastR * 0.4, blastR * 0.4),
                  rand(0.5, 0.85), rand(35, 60), rand(12, 20)
                );
              }

              punch(0.18, 0.04);
              sound.play('coreHit');

              // 伤害判定
              for (const t2 of state.trees) {
                if (t2.dead) continue;
                if (dist(bx, by, t2.x, t2.y) < blastR) {
                  t2.hp = Math.max(0, t2.hp - 40);
                  if (t2.hp <= 0) t2.dead = true;
                  emitBurst(t2.x, t2.y - 20, '#ff8844', 6, 70, 3);
                }
              }
              if (!state.hero.isDown && dist(bx, by, state.hero.x, state.hero.y) < blastR) {
                damageHero(32);
              }
            }, pt.delay);
          }
          addMessage('BOSS: Ground Eruption!', '#ff6622', 1.5);
          sound.play('spawn');
        }
      }
    }

    // miniboss / boss 持续排废气
    if (enemy.type === 'miniboss' || enemy.type === 'boss') {
      enemy.exhaustTimer = (enemy.exhaustTimer || 0) - dt;
      if (enemy.exhaustTimer <= 0) {
        enemy.exhaustTimer = enemy.type === 'boss' ? 0.12 : 0.2;
        const count = enemy.type === 'boss' ? 3 : 2;
        for (let i = 0; i < count; i++) {
          state.smokeParticles.push({
            x: enemy.x + rand(-enemy.radius * 0.5, enemy.radius * 0.5),
            y: enemy.y - enemy.radius * rand(0.6, 1.0),
            vx: rand(-12, 12),
            vy: rand(-28, -14),
            size: rand(enemy.type === 'boss' ? 10 : 7, enemy.type === 'boss' ? 20 : 14),
            alpha: rand(0.28, 0.45),
            ttl: rand(0.8, 1.6),
            grow: rand(0.6, 1.2),
            color: enemy.type === 'boss' ? '100,60,20' : '80,72,30'
          });
        }
      }
    }

    if (!state.hero.isDown) {
      const heroD = dist(enemy.x, enemy.y, state.hero.x, state.hero.y - 50);
      if (heroD < enemy.radius + 28 && enemy.attackCd <= 0) {
        enemy.attackCd = CONFIG.enemy[enemy.type].attackCd;
        damageHero(enemy.damage);
      }
    }
  }
  state.enemies = state.enemies.filter(e => !e.dead || e.hp > 0);
}

function updateProjectiles(dt) {
  for (const p of state.projectiles) {
    p.ttl -= dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    if (p.ttl <= 0) continue;

    if (p.isPoison) {
      // skull 毒气弹：打树木和英雄
      let hit = false;
      for (const tree of state.trees) {
        if (tree.dead) continue;
        if (dist(p.x, p.y, tree.x, tree.y - 20) < p.radius + 22) {
          tree.hp = Math.max(0, tree.hp - p.dmg);
          if (tree.hp <= 0) tree.dead = true;
          emitBurst(p.x, p.y, p.color, 5, 50, 2.5);
          addPollution(p.x, p.y, 0.18, rand(24, 38), 8);
          p.ttl = 0; hit = true; break;
        }
      }
      if (!hit && !state.hero.isDown) {
        if (dist(p.x, p.y, state.hero.x, state.hero.y - 40) < p.radius + 22) {
          damageHero(p.dmg);
          emitBurst(p.x, p.y, p.color, 5, 50, 2.5);
          p.ttl = 0;
        }
      }
    } else {
      // 玩家武器弹：打敌人
      for (const enemy of state.enemies) {
        if (enemy.dead) continue;
        if (dist(p.x, p.y, enemy.x, enemy.y - enemy.radius * 0.4) < p.radius + enemy.radius) {
          damageEnemy(enemy, p.dmg, p.effect);
          p.ttl = 0;
          emitBurst(p.x, p.y, p.color, 4, 52, 2.4);
          break;
        }
      }
    }
  }
  state.projectiles = state.projectiles.filter(p => p.ttl > 0);
}

function updateParticles(dt) {
  state.hitStop = Math.max(0, state.hitStop - dt);
  state.shake = Math.max(0, state.shake - dt * 1.8);
  for (const p of state.particles) {
    p.ttl -= dt;
    if (p.ring) {
      const total = p.maxRadius || p.radius;
      p.radius = lerp(total, total * 1.7, 1 - p.ttl / Math.max(0.0001, (p.life || total)));
      continue;
    }
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.96;
    p.vy = p.vy * 0.96 + 20 * dt;
  }
  state.particles = state.particles.filter(p => p.ttl > 0);
  // 有限生命周期的 pollution patch 逐渐消退
  for (const patch of state.pollutions) {
    if (patch.ttl < 999) {
      patch.ttl -= dt;
      patch.toxin = Math.max(0, patch.toxin - dt * 0.04);
    }
  }
  state.pollutions = state.pollutions.filter(p => p.ttl > 0 && p.toxin > 0.01);
  state.messages = state.messages.filter(m => {
    m.ttl -= dt;
    m.y -= dt * 18;
    return m.ttl > 0;
  });
  state.slashes = state.slashes.filter(s => {
    s.ttl -= dt;
    return s.ttl > 0;
  });
}

function updateWave(dt) {
  // Quiz state takes priority
  if (state.quizState) {
    updateQuiz(dt);
    return;
  }
  // Pre-quiz delay: show "Wave cleared!" for 2s before popping quiz
  if (state.waveState === 'quizPending') {
    state.quizPendingTimer -= dt;
    if (state.quizPendingTimer <= 0) {
      state.waveState = 'quiz';
      startQuiz(state.quizPendingIndex);
    }
    return;
  }
  if (state.waveState === 'break') {
    state.waveTimer -= dt;
    if (state.waveTimer <= 0) openNextWave();
    return;
  }
  if (state.waveState === 'fighting') {
    state.waveSpawnTimer -= dt;
    if (state.waveQueue.length > 0 && state.waveSpawnTimer <= 0) {
      spawnEnemy(state.waveQueue.shift());
      state.waveSpawnTimer = state.waveSpawnGap;
    }
    if (state.waveQueue.length === 0 && state.enemies.every(e => e.dead || e.hp <= 0)) {
      if (state.waveIndex === CONFIG.waves.length - 1) {
        state.waveState = 'victoryCheck';
      } else {
        addMessage(`Wave ${state.waveIndex + 1} cleared!`, '#bfffb5', 1.8);
        if (state.waveIndex === 0 && !state.ownedWeapons.includes('firesword')) {
          addMessage('Flame Greatsword is now available in the armory', '#ff9d4f', 2.0);
        }
        const quizConfigIndex = state.waveIndex; // 0=after Wave1, 1=after Wave2
        if (quizConfigIndex < QUIZ_CONFIG.length) {
          addMessage('Eco Quiz incoming — get ready!', '#b8ffca', 1.8);
          state.waveState = 'quizPending';
          state.quizPendingTimer = 2.2;
          state.quizPendingIndex = quizConfigIndex;
        } else {
          state.waveState = 'break';
          state.waveTimer = CONFIG.breakDuration;
          state.breakPlantHint = true;
        }
      }
    }
  }
  if (state.waveState === 'victoryCheck' && state.enemies.every(e => e.dead || e.hp <= 0)) {
    state.phase = 'victory';
    state.victoryTimer = 0;
    state.cleanReveal = 0;
    sound.play('victory');
    setTimeout(() => sound.playVictoryMusic(), 1500);
  }
}

// 工厂烟囱位置（与地图美术对齐）
const FACTORY_CHIMNEYS = [
  { x: 1058, y: 148 },
  { x: 1118, y: 132 },
  { x: 1158, y: 158 }
];
const FACTORY_DRAINS = [
  { x: 1084, y: 470 },
  { x: 1128, y: 518 }
];
let factorySmokeTimer = 0;
let factoryDrainTimer = 0;

function updateFactoryFX(dt) {
  factorySmokeTimer -= dt;
  if (factorySmokeTimer <= 0) {
    factorySmokeTimer = 0.18;
    for (const ch of FACTORY_CHIMNEYS) {
      state.smokeParticles.push({
        x: ch.x + rand(-4, 4),
        y: ch.y,
        vx: rand(-8, 8),
        vy: rand(-38, -22),
        size: rand(10, 20),
        alpha: rand(0.32, 0.52),
        ttl: rand(1.4, 2.4),
        grow: rand(0.8, 1.4),
        color: Math.random() < 0.5 ? '60,52,48' : '80,70,58'
      });
    }
  }
  factoryDrainTimer -= dt;
  if (factoryDrainTimer <= 0) {
    factoryDrainTimer = 0.25;
    for (const dr of FACTORY_DRAINS) {
      for (let i = 0; i < 3; i++) {
        state.smokeParticles.push({
          x: dr.x + rand(-6, 6),
          y: dr.y + rand(0, 8),
          vx: rand(-18, -6),
          vy: rand(-6, 4),
          size: rand(4, 9),
          alpha: rand(0.35, 0.6),
          ttl: rand(0.8, 1.6),
          grow: rand(-0.2, 0.2),
          color: '72,140,48',
          isDrain: true
        });
      }
    }
  }
  for (const p of state.smokeParticles) {
    p.ttl -= dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.98;
    p.vy *= 0.99;
    p.size += p.grow * dt * 8;
    p.alpha -= dt * (p.isDrain ? 0.28 : 0.18);
  }
  state.smokeParticles = state.smokeParticles.filter(p => p.ttl > 0 && p.alpha > 0);
}

function updateTwisters(dt) {
  for (const tw of state.twisters) {
    tw.ttl -= dt;
    tw.alpha = clamp(tw.ttl / 0.5, 0, 0.85);
    tw.x += tw.vx * dt;
    tw.y += tw.vy * dt;
    tw.vx *= 0.97;
    tw.vy *= 0.97;
    tw.spin += tw.spinSpeed * dt;
    tw.dmgTimer -= dt;

    if (tw.dmgTimer <= 0) {
      tw.dmgTimer = 0.45;
      // 伤害树木
      for (const tree of state.trees) {
        if (tree.dead) continue;
        if (dist(tw.x, tw.y, tree.x, tree.y) < tw.radius + 20) {
          tree.hp = Math.max(0, tree.hp - 12);
          if (tree.hp <= 0) tree.dead = true;
          emitBurst(tree.x, tree.y - 15, '#cc66ff', 4, 45, 2);
        }
      }
      // 伤害英雄
      if (!state.hero.isDown) {
        if (dist(tw.x, tw.y, state.hero.x, state.hero.y - 40) < tw.radius + 20) {
          damageHero(10);
        }
      }
    }
  }
  state.twisters = state.twisters.filter(tw => tw.ttl > 0);
}

function updatePlaying(dt) {
  const gameDt = state.quizState ? dt * 0.12 : dt; // slow-mo during quiz
  updateHero(gameDt);
  updateTrees(gameDt);
  updateSprites(gameDt);
  updateEnemies(gameDt);
  updateTwisters(gameDt);
  updateUltPulses(gameDt);
  updateProjectiles(gameDt);
  updateParticles(gameDt);
  updateFactoryFX(gameDt);
  updateActiveCharms(dt);
  updateWave(dt);
}

function drawImageCentered(img, x, y, scale, flip = 1) {
  if (!imageReady(img)) return false;
  const w = img.width * scale;
  const h = img.height * scale;
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(flip, 1);
  ctx.drawImage(img, -w / 2, -h, w, h);
  ctx.restore();
  return true;
}

function enemyVisualScale(type) {
  return CONFIG.visual.enemyScale[type] || 0.12;
}

function enemyShadowSpec(type) {
  return CONFIG.visual.enemyShadow[type] || { rx: 20, ry: 8 };
}

function enemyBobAmount(type) {
  return CONFIG.visual.bob[type] || 0.7;
}

function weaponGlyphType(id) {
  if (id === 'firesword') return 'flameSword';
  if (id === 'icesword') return 'iceSword';
  if (id === 'staff') return 'staff';
  return 'sword';
}

function sheetIconRect(name) {
  const cellW = 357;
  const cellH = 551;
  const map = {
    seed: [0, 0],
    sword: [1, 0],
    burst: [2, 0],
    bag: [3, 0],
    heart: [0, 1],
    core: [1, 1],
    coin: [2, 1],
    toxin: [3, 1],
    co2: [0, 0],
    potion: [3, 0]
  };
  const rc = map[name];
  if (!rc) return null;
  return { sx: rc[0] * cellW, sy: rc[1] * cellH, sw: cellW, sh: cellH };
}

function drawSheetIcon(name, x, y, size) {
  const img = images.uiSheet;
  const rect = sheetIconRect(name);
  if (!imageReady(img) || !rect) return false;
  ctx.drawImage(img, rect.sx, rect.sy, rect.sw, rect.sh, x - size / 2, y - size / 2, size, size);
  return true;
}

function drawWeaponThumb(id, x, y, w, h) {
  const img = images.weapon[id];
  if (!imageReady(img)) return false;
  const scale = Math.min((w * 0.9) / img.width, (h * 0.9) / img.height);
  const dw = img.width * scale;
  const dh = img.height * scale;
  ctx.drawImage(img, x + (w - dw) / 2, y + (h - dh) / 2, dw, dh);
  return true;
}

function weaponDetailLines(id) {
  if (id === 'firesword') return ['Heavy slash', 'Burn over time', 'Close splash hit'];
  if (id === 'icesword') return ['Heavy slash', 'Slow on hit', 'Safer crowd control'];
  if (id === 'staff') return ['Ranged twin bolts', 'Burn and slow', 'Best reach option'];
  return ['Fast sword slash', 'Stable early weapon', 'Reliable single target'];
}

function drawUiGlyph(type, x, y, size, color = '#ffffff') {
  if (drawSheetIcon(type, x, y, size)) return;
  ctx.save();
  ctx.translate(x, y);
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = Math.max(2, size * 0.08);
  switch (type) {
    case 'co2':
      ctx.beginPath();
      ctx.arc(-size * 0.12, 0, size * 0.16, 0, Math.PI * 2);
      ctx.arc(size * 0.04, -size * 0.05, size * 0.2, 0, Math.PI * 2);
      ctx.arc(size * 0.24, 0, size * 0.14, 0, Math.PI * 2);
      ctx.fill();
      ctx.clearRect(-size * 0.42, size * 0.05, size * 0.84, size * 0.28);
      ctx.fillRect(-size * 0.34, size * 0.02, size * 0.68, size * 0.18);
      break;
    case 'toxin':
      ctx.beginPath();
      ctx.moveTo(0, -size * 0.34);
      ctx.quadraticCurveTo(size * 0.3, -size * 0.05, size * 0.18, size * 0.22);
      ctx.quadraticCurveTo(size * 0.08, size * 0.38, 0, size * 0.4);
      ctx.quadraticCurveTo(-size * 0.08, size * 0.38, -size * 0.18, size * 0.22);
      ctx.quadraticCurveTo(-size * 0.3, -size * 0.05, 0, -size * 0.34);
      ctx.fill();
      break;
    case 'heart':
      ctx.beginPath();
      ctx.moveTo(0, size * 0.34);
      ctx.bezierCurveTo(size * 0.42, size * 0.08, size * 0.42, -size * 0.22, 0, -size * 0.06);
      ctx.bezierCurveTo(-size * 0.42, -size * 0.22, -size * 0.42, size * 0.08, 0, size * 0.34);
      ctx.fill();
      break;
    case 'core':
      ctx.beginPath();
      ctx.moveTo(0, -size * 0.36);
      ctx.lineTo(size * 0.24, 0);
      ctx.lineTo(0, size * 0.36);
      ctx.lineTo(-size * 0.24, 0);
      ctx.closePath();
      ctx.fill();
      break;
    case 'coin':
      ctx.beginPath();
      ctx.arc(0, 0, size * 0.26, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(0, 0, size * 0.14, 0, Math.PI * 2);
      ctx.stroke();
      break;
    case 'wave':
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.arc(-size * 0.25 + i * size * 0.25, 0, size * 0.07, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    case 'seed':
      ctx.beginPath();
      ctx.ellipse(0, size * 0.02, size * 0.15, size * 0.22, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(0, size * 0.18);
      ctx.lineTo(0, size * 0.38);
      ctx.stroke();
      break;
    case 'burst':
      for (let i = 0; i < 8; i++) {
        const a = i / 8 * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a) * size * 0.1, Math.sin(a) * size * 0.1);
        ctx.lineTo(Math.cos(a) * size * 0.34, Math.sin(a) * size * 0.34);
        ctx.stroke();
      }
      ctx.beginPath();
      ctx.arc(0, 0, size * 0.12, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'shopcart':
      ctx.beginPath();
      ctx.moveTo(-size * 0.24, -size * 0.1);
      ctx.lineTo(-size * 0.12, -size * 0.1);
      ctx.lineTo(-size * 0.03, size * 0.1);
      ctx.lineTo(size * 0.2, size * 0.1);
      ctx.lineTo(size * 0.25, -size * 0.05);
      ctx.lineTo(-size * 0.08, -size * 0.05);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(-size * 0.02, size * 0.2, size * 0.05, 0, Math.PI * 2);
      ctx.arc(size * 0.16, size * 0.2, size * 0.05, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'bag':
      ctx.strokeRect(-size * 0.22, -size * 0.1, size * 0.44, size * 0.36);
      ctx.beginPath();
      ctx.arc(0, -size * 0.08, size * 0.14, Math.PI, 0);
      ctx.stroke();
      break;
    case 'potion':
      ctx.beginPath();
      ctx.moveTo(-size * 0.14, -size * 0.24);
      ctx.lineTo(size * 0.14, -size * 0.24);
      ctx.lineTo(size * 0.08, -size * 0.1);
      ctx.lineTo(size * 0.16, size * 0.18);
      ctx.quadraticCurveTo(0, size * 0.34, -size * 0.16, size * 0.18);
      ctx.lineTo(-size * 0.08, -size * 0.1);
      ctx.closePath();
      ctx.stroke();
      break;
    case 'staff':
      ctx.beginPath();
      ctx.moveTo(-size * 0.22, size * 0.28);
      ctx.lineTo(size * 0.14, -size * 0.24);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(size * 0.2, -size * 0.28, size * 0.1, 0, Math.PI * 2);
      ctx.stroke();
      break;
    case 'flameSword':
    case 'iceSword':
    case 'sword':
      ctx.beginPath();
      ctx.moveTo(-size * 0.22, size * 0.28);
      ctx.lineTo(size * 0.18, -size * 0.22);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-size * 0.1, size * 0.12);
      ctx.lineTo(size * 0.04, size * 0.02);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-size * 0.24, size * 0.3);
      ctx.lineTo(-size * 0.08, size * 0.18);
      ctx.stroke();
      break;
    default:
      ctx.beginPath();
      ctx.arc(0, 0, size * 0.18, 0, Math.PI * 2);
      ctx.fill();
      break;
  }
  ctx.restore();
}

function drawBackground() {
  if (imageReady(images.map)) ctx.drawImage(images.map, 0, 0, CONFIG.width, CONFIG.height);
  else {
    const g = ctx.createLinearGradient(0, 0, CONFIG.width, 0);
    g.addColorStop(0, '#95c768');
    g.addColorStop(0.42, '#b5b76c');
    g.addColorStop(0.64, '#7b6652');
    g.addColorStop(1, '#49384f');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, CONFIG.width, CONFIG.height);
  }

  const cleanFactor = state.phase === 'victory' ? 1 - state.cleanReveal : 1;
  for (const patch of state.pollutions) {
    const alpha = clamp(patch.toxin, 0, 1) * 0.25 * cleanFactor;
    if (alpha < 0.01) continue; // 跳过几乎透明的 patch，省去 createRadialGradient
    const g = ctx.createRadialGradient(patch.x, patch.y, 0, patch.x, patch.y, patch.radius);
    g.addColorStop(0, `rgba(132, 72, 164, ${alpha})`);
    g.addColorStop(1, 'rgba(132, 72, 164, 0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(patch.x, patch.y, patch.radius, 0, Math.PI * 2);
    ctx.fill();
  }

  if (state.phase === 'victory') {
    state.cleanReveal = clamp(state.victoryTimer / 3, 0, 1);
    if (imageReady(images.cleanFactory)) {
      const fx = 840;
      const fw = 360 * state.cleanReveal;
      if (fw > 0) {
        ctx.save();
        ctx.beginPath();
        ctx.rect(fx, 0, fw, CONFIG.height);
        ctx.clip();
        ctx.drawImage(images.cleanFactory, 840, 0, 360, CONFIG.height);
        ctx.restore();
      }
    }
    const sweepX = 840 + 360 * state.cleanReveal;
    ctx.fillStyle = 'rgba(200,255,180,0.18)';
    ctx.fillRect(840, 0, 360 * state.cleanReveal, CONFIG.height);
    ctx.fillStyle = 'rgba(240,255,220,0.45)';
    ctx.fillRect(sweepX - 6, 0, 10, CONFIG.height);
  }
}

function drawSprites() {
  const t = performance.now() * 0.006;
  for (const sp of state.sprites) {
    // 尾迹
    for (const tr of sp.trail) {
      const a = clamp(tr.ttl / 0.35, 0, 1) * 0.55;
      ctx.globalAlpha = a;
      ctx.fillStyle = '#a8ffc8';
      ctx.beginPath();
      ctx.arc(tr.x, tr.y - 10, 3.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // 精灵本体：简洁的发光小球 + 翅膀
    const bob = Math.sin(t + sp.x * 0.02) * 4;
    const sx = sp.x;
    const sy = sp.y - 14 + bob;

    // 光晕
    const glow = ctx.createRadialGradient(sx, sy, 0, sx, sy, 14);
    glow.addColorStop(0, 'rgba(180,255,210,0.55)');
    glow.addColorStop(1, 'rgba(100,255,160,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(sx, sy, 14, 0, Math.PI * 2);
    ctx.fill();

    // 翅膀
    const wingFlap = Math.sin(t * 4 + sp.x * 0.01) * 0.4;
    ctx.save();
    ctx.translate(sx, sy);
    ctx.globalAlpha = 0.72;
    ctx.fillStyle = 'rgba(200,255,230,0.7)';
    ctx.beginPath();
    ctx.ellipse(-6, -1, 7, 3.5, -0.4 + wingFlap, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(6, -1, 7, 3.5, 0.4 - wingFlap, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // 身体
    ctx.fillStyle = '#d4fff0';
    ctx.beginPath();
    ctx.arc(0, 0, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#7effc0';
    ctx.beginPath();
    ctx.arc(0, 0, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

function drawTrees() {
  for (const tree of state.trees) {
    if (tree.dead) continue;
    const health = tree.hp / tree.maxHp;
    const g = tree.growScale ?? 1;
    const sway = Math.sin(tree.sway) * 0.35 * g;
    const baseScale = tree.zone === 'enemy' ? CONFIG.visual.treeScale.enemy : CONFIG.visual.treeScale.sanctuary;
    const drawScale = baseScale * g;

    // 阴影跟随 growScale 缩放，并贴在格子中心
    const shadowRx = CONFIG.visual.treeShadow.rx * g;
    const shadowRy = CONFIG.visual.treeShadow.ry * g;
    ctx.save();
    ctx.fillStyle = `rgba(20, 18, 10, ${tree.zone === 'enemy' ? 0.22 : 0.3})`;
    ctx.beginPath();
    ctx.ellipse(tree.x, tree.y + 2, shadowRx, shadowRy, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    if (imageReady(images.tree)) {
      const img = images.tree;
      const w = img.width * drawScale;
      const h = img.height * drawScale;
      // 图片底部有 90px 空白（共 1155px），树根实际在底边往上 90/1155 处
      // 用 bottomBlank 把锚点上移，让树根精确踩在 tree.y
      const bottomBlank = (90 / 1155) * h;
      ctx.save();
      ctx.translate(tree.x + sway, tree.y + bottomBlank);
      ctx.drawImage(img, -w / 2, -h, w, h);
      ctx.restore();
    } else {
      ctx.fillStyle = health > 0.5 ? '#4a8b38' : health > 0.2 ? '#88843a' : '#75614f';
      ctx.beginPath();
      ctx.arc(tree.x, tree.y - 16 * g, 18 * g, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#6b4827';
      ctx.fillRect(tree.x - 4 * g, tree.y - 14 * g, 8 * g, 24 * g);
    }

    if (tree.zone === 'enemy') {
      ctx.strokeStyle = 'rgba(170,255,170,0.32)';
      ctx.beginPath();
      ctx.arc(tree.x, tree.y - 10 * g, 38 * g, 0, Math.PI * 2);
      ctx.stroke();
    }
  }
}

function drawCore() {
  ctx.save();
  const pulse = 1 + Math.sin(performance.now() * 0.004) * 0.05;
  const aura = ctx.createRadialGradient(CONFIG.core.x, CONFIG.core.y, 10, CONFIG.core.x, CONFIG.core.y, 72);
  aura.addColorStop(0, 'rgba(164,255,208,0.42)');
  aura.addColorStop(1, 'rgba(164,255,208,0)');
  ctx.fillStyle = aura;
  ctx.beginPath();
  ctx.arc(CONFIG.core.x, CONFIG.core.y, 72 * pulse, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  if (!drawImageCentered(images.core, CONFIG.core.x, CONFIG.core.y + 34, CONFIG.visual.coreScale)) {
    ctx.fillStyle = '#9fffd8';
    ctx.beginPath();
    ctx.arc(CONFIG.core.x, CONFIG.core.y, 26, 0, Math.PI * 2);
    ctx.fill();
  }

  const pct = state.core.hp / CONFIG.core.maxHp;
  ctx.fillStyle = 'rgba(12, 18, 14, 0.7)';
  ctx.fillRect(CONFIG.core.x - 56, CONFIG.core.y - 84, 112, 12);
  ctx.fillStyle = '#61e79e';
  ctx.fillRect(CONFIG.core.x - 54, CONFIG.core.y - 82, 108 * pct, 8);
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.strokeRect(CONFIG.core.x - 56, CONFIG.core.y - 84, 112, 12);
}

function drawHero() {
  const hero = state.hero;
  if (hero.isDown) {
    ctx.fillStyle = 'rgba(10, 10, 10, 0.4)';
    ctx.beginPath();
    ctx.ellipse(hero.x, hero.y - 5, 28, 12, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#e7b4b4';
    ctx.font = '16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`Respawn ${hero.respawnTimer.toFixed(1)}s`, hero.x, hero.y - 78);
    return;
  }

  const set = images.hero[state.currentWeapon];
  const moving = (keys['KeyA'] || keys['ArrowLeft'] || keys['KeyD'] || keys['ArrowRight'] || keys['KeyW'] || keys['ArrowUp'] || keys['KeyS'] || keys['ArrowDown']);
  let sprite = set.idle;
  if (hero.ultTime > 0 && imageReady(images.hero.ultimate)) sprite = images.hero.ultimate;
  else if (hero.attackTime > 0 && imageReady(set.attack)) sprite = set.attack;
  else if (moving) {
    const frame = Math.floor(hero.walkTime * 5) % set.move.length;
    sprite = set.move[frame];
  }

  ctx.save();
  const shadowAlpha = hero.invuln > 0 ? 0.18 : 0.28;
  ctx.fillStyle = `rgba(14, 12, 10, ${shadowAlpha})`;
  ctx.beginPath();
  ctx.ellipse(hero.x, hero.y - 4, CONFIG.visual.heroShadow.rx, CONFIG.visual.heroShadow.ry, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  const scale = CONFIG.visual.heroScale[state.currentWeapon] || CONFIG.visual.heroScale.sword;
  const lunge = hero.attackTime > 0 ? hero.facing * (1 - hero.attackTime / 0.24) * 5 : 0;
  if (hero.ultTime > 0) {
    const t = clamp(hero.ultTime / 0.32, 0, 1);
    const r = 48 + (1 - t) * 76;
    const g = ctx.createRadialGradient(hero.x, hero.y - 56, 8, hero.x, hero.y - 56, r);
    g.addColorStop(0, `rgba(255, 232, 140, ${0.32 * t})`);
    g.addColorStop(0.55, `rgba(255, 214, 96, ${0.18 * t})`);
    g.addColorStop(1, 'rgba(255, 214, 96, 0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(hero.x, hero.y - 56, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = `rgba(255, 241, 182, ${0.75 * t})`;
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.arc(hero.x, hero.y - 56, 22 + (1 - t) * 88, 0, Math.PI * 2);
    ctx.stroke();
  }
  drawImageCentered(sprite, hero.x + lunge, hero.y + Math.sin(hero.walkTime * 2) * CONFIG.visual.bob.hero, scale, hero.facing);
}

function enemySprite(enemy) {
  if (enemy.type === 'miniboss') {
    return images.enemy.miniboss[Math.floor(enemy.gait) % 4] || images.enemy.minibossIdle;
  }
  if (enemy.type === 'boss') {
    return images.enemy.boss[Math.floor(enemy.gait) % 4] || images.enemy.bossIdle;
  }
  return images.enemy[enemy.type];
}

function drawEnemies() {
  for (const enemy of state.enemies) {
    if (enemy.dead) continue;
    const shadow = enemyShadowSpec(enemy.type);
    ctx.fillStyle = 'rgba(18,14,10,0.3)';
    ctx.beginPath();
    ctx.ellipse(enemy.x, enemy.y - 3, shadow.rx, shadow.ry, 0, 0, Math.PI * 2);
    ctx.fill();
    const bob = Math.sin(enemy.gait) * enemyBobAmount(enemy.type);
    const sprite = enemySprite(enemy);
    const flash = enemy.hitFlash || 0;
    const squash = enemy.hitSquash || 0;
    if (imageReady(sprite)) {
      const scale = enemyVisualScale(enemy.type);
      const w = sprite.width * scale * (1 + squash);
      const h = sprite.height * scale * (1 - squash * 0.55);
      const flip = 1;
      ctx.save();
      ctx.translate(enemy.x, enemy.y + bob);
      ctx.scale(flip, 1);
      ctx.drawImage(sprite, -w / 2, -h, w, h);
      if (flash > 0) {
        // 用 lighter 叠加白色闪光，只影响有像素的区域，不产生白框
        ctx.globalCompositeOperation = 'lighter';
        ctx.globalAlpha = flash * 3.5;
        ctx.drawImage(sprite, -w / 2, -h, w, h);
        ctx.globalCompositeOperation = 'source-over';
        ctx.globalAlpha = 1;
      }
      if (enemy.frozen) {
        ctx.globalCompositeOperation = 'source-atop';
        ctx.globalAlpha = 0.45;
        ctx.fillStyle = '#a0e4ff';
        ctx.fillRect(-w / 2, -h, w, h);
        ctx.globalCompositeOperation = 'source-over';
        ctx.globalAlpha = 1;
      }
      ctx.restore();
    }
    const pct = enemy.hp / enemy.maxHp;
    ctx.fillStyle = 'rgba(10, 12, 15, 0.65)';
    ctx.fillRect(enemy.x - 28, enemy.y - enemy.radius - 28, 56, 8);
    ctx.fillStyle = enemy.type === 'boss' ? '#e56cff' : enemy.type === 'miniboss' ? '#f5ac52' : '#82f08d';
    ctx.fillRect(enemy.x - 27, enemy.y - enemy.radius - 27, 54 * pct, 6);
  }
}

function drawSmokeParticles() {
  for (const p of state.smokeParticles) {
    ctx.globalAlpha = Math.max(0, p.alpha);
    ctx.fillStyle = `rgb(${p.color})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, Math.max(1, p.size), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawProjectiles() {
  for (const p of state.projectiles) {
    const len = Math.hypot(p.vx, p.vy) || 1;
    const tx = (p.vx / len) * 16;
    const ty = (p.vy / len) * 16;
    if (p.isPoison) {
      // 毒气弹：颜色跟随弹丸 color（skull=绿，boss=紫）
      const isPurple = p.color && p.color.startsWith('#aa');
      const trailRgba = isPurple ? 'rgba(120,30,180,0.5)' : 'rgba(80,200,60,0.45)';
      const coreRgba = isPurple
        ? `rgba(160,50,220,${0.75 + 0.25 * Math.sin(performance.now() * 0.012)})`
        : `rgba(100,230,80,${0.75 + 0.25 * Math.sin(performance.now() * 0.012)})`;
      const rimRgba = isPurple ? 'rgba(200,100,255,0.6)' : 'rgba(180,255,140,0.6)';
      const pulse = 0.75 + 0.25 * Math.sin(performance.now() * 0.012);
      ctx.strokeStyle = trailRgba;
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.moveTo(p.x - tx, p.y - ty);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
      ctx.fillStyle = coreRgba;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius * pulse, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = rimRgba;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius * 1.4, 0, Math.PI * 2);
      ctx.stroke();
    } else {
      ctx.strokeStyle = 'rgba(255, 121, 255, 0.5)';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(p.x - tx, p.y - ty);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawTwisters() {
  for (const tw of state.twisters) {
    const t = performance.now() * 0.001;
    ctx.save();
    ctx.translate(tw.x, tw.y);
    ctx.rotate(tw.spin);
    ctx.globalAlpha = tw.alpha;

    // 外层大旋臂
    for (let arm = 0; arm < 3; arm++) {
      ctx.save();
      ctx.rotate((arm / 3) * Math.PI * 2);
      const grad = ctx.createLinearGradient(0, 0, tw.radius, 0);
      grad.addColorStop(0, 'rgba(200,100,255,0.9)');
      grad.addColorStop(0.5, 'rgba(160,60,230,0.5)');
      grad.addColorStop(1, 'rgba(120,40,200,0)');
      ctx.strokeStyle = grad;
      ctx.lineWidth = 4.5;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.quadraticCurveTo(tw.radius * 0.5, -tw.radius * 0.4, tw.radius, 0);
      ctx.stroke();
      ctx.restore();
    }

    // 中心亮核
    const coreGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, tw.radius * 0.45);
    coreGrad.addColorStop(0, 'rgba(255,200,255,0.95)');
    coreGrad.addColorStop(0.4, 'rgba(190,80,255,0.7)');
    coreGrad.addColorStop(1, 'rgba(140,40,220,0)');
    ctx.fillStyle = coreGrad;
    ctx.beginPath();
    ctx.arc(0, 0, tw.radius * 0.45, 0, Math.PI * 2);
    ctx.fill();

    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

function drawUltPulses() {
  const hero = state.hero;

  // 冲刺残影
  if (hero && hero.dashTrail && hero.dashTrail.length > 0) {
    const set = images.hero[state.currentWeapon];
    const sprite = set ? set.attack || set.idle : null;
    if (imageReady(sprite)) {
      const scale = CONFIG.visual.heroScale[state.currentWeapon] || CONFIG.visual.heroScale.sword;
      for (let i = 0; i < hero.dashTrail.length; i++) {
        const tr = hero.dashTrail[i];
        const a = clamp(tr.ttl / tr.maxTtl, 0, 1);
        const w = sprite.width * scale;
        const h = sprite.height * scale;
        ctx.save();
        ctx.globalAlpha = a * 0.45;
        ctx.globalCompositeOperation = 'lighter';
        ctx.translate(tr.x, tr.y);
        ctx.scale(hero.facing, 1);
        ctx.drawImage(sprite, -w / 2, -h, w, h);
        ctx.globalCompositeOperation = 'source-over';
        ctx.globalAlpha = 1;
        ctx.restore();
      }
    }
  }

  // 净化中的敌人：绿色光晕闪烁溶解
  for (const enemy of state.enemies) {
    if (!enemy.purifying || enemy.dead) continue;
    const sprite = enemySprite(enemy);
    if (!imageReady(sprite)) continue;
    const scale = enemyVisualScale(enemy.type);
    const w = sprite.width * scale;
    const h = sprite.height * scale;
    const maxTimer = enemy.purifyLethal ? 0.65 : 0.25;
    const t = clamp(enemy.purifyTimer / maxTimer, 0, 1);
    const flicker = 0.5 + 0.5 * Math.sin(performance.now() * 0.022);
    ctx.save();
    ctx.translate(enemy.x, enemy.y);
    ctx.globalAlpha = 0.3 + t * 0.7;
    ctx.drawImage(sprite, -w / 2, -h, w, h);
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = t * 0.55 * flicker;
    ctx.drawImage(sprite, -w / 2, -h, w, h);
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

function drawSlashes() {
  for (const slash of state.slashes) {
    const t = clamp(slash.ttl / 0.16, 0, 1);
    ctx.save();
    ctx.translate(slash.x, slash.y);
    ctx.scale(slash.facing, 1);
    ctx.rotate(-0.25 + (1 - t) * 0.55);
    ctx.globalAlpha = 1 - t;
    ctx.strokeStyle = slash.color;
    ctx.lineWidth = 6 * (1 - t * 0.45);
    ctx.beginPath();
    ctx.arc(0, 0, slash.size * (0.75 + (1 - t) * 0.22), -slash.arc * 0.55, slash.arc * 0.18);
    ctx.stroke();
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2;
    ctx.globalAlpha = (1 - t) * 0.45;
    ctx.beginPath();
    ctx.arc(0, 0, slash.size * (0.6 + (1 - t) * 0.18), -slash.arc * 0.52, slash.arc * 0.14);
    ctx.stroke();
    ctx.restore();
  }
}

function drawParticles() {
  for (const p of state.particles) {
    if (p.ring) {
      ctx.strokeStyle = p.color;
      ctx.globalAlpha = clamp(p.ttl * 2, 0, 1);
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
      continue;
    }
    ctx.globalAlpha = clamp(p.ttl * 1.5, 0, 1);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function drawHud() {
  const hero = state.hero;
  const canAffordShop = hasAffordableShopItem();

  function avatarBar(x, y, avatarType, value, maxValue, fill, label, suffix = '') {
    const size = 42;
    ctx.fillStyle = 'rgba(7, 12, 10, 0.34)';
    ctx.fillRect(x, y, 228, 42);
    ctx.strokeStyle = 'rgba(236, 255, 238, 0.12)';
    ctx.strokeRect(x, y, 228, 42);

    ctx.save();
    ctx.beginPath();
    ctx.arc(x + 22, y + 21, 17, 0, Math.PI * 2);
    ctx.clip();
    if (avatarType === 'hero') {
      const img = images.hero[state.currentWeapon]?.idle || images.hero.sword.idle;
      if (imageReady(img)) {
        const s = Math.min((size * 1.15) / img.width, (size * 1.15) / img.height);
        const dw = img.width * s;
        const dh = img.height * s;
        ctx.drawImage(img, x + 22 - dw / 2, y + 21 - dh / 2 + 2, dw, dh);
      } else {
        drawUiGlyph('heart', x + 22, y + 21, 20, '#8fe09a');
      }
    } else {
      if (imageReady(images.core)) {
        const img = images.core;
        const s = Math.min((size * 0.9) / img.width, (size * 0.9) / img.height);
        const dw = img.width * s;
        const dh = img.height * s;
        ctx.drawImage(img, x + 22 - dw / 2, y + 21 - dh / 2 + 2, dw, dh);
      } else {
        drawUiGlyph('core', x + 22, y + 21, 20, '#7fe4ff');
      }
    }
    ctx.restore();

    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.beginPath();
    ctx.arc(x + 22, y + 21, 17, 0, Math.PI * 2);
    ctx.stroke();

    ctx.fillStyle = 'rgba(244,252,246,0.96)';
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(label, x + 48, y + 15);
    ctx.fillStyle = '#eefcf0';
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(`${Math.round(value)}${suffix}`, x + 216, y + 16);
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fillRect(x + 48, y + 24, 168, 8);
    ctx.fillStyle = fill;
    ctx.fillRect(x + 48, y + 24, 168 * clamp(value / maxValue, 0, 1), 8);
  }

  function skillOrb(x, y, keyLabel, icon, progress, tone) {
    const ready = progress >= 0.999;
    const radius = 34;
    ctx.save();
    ctx.shadowColor = ready ? tone : 'transparent';
    ctx.shadowBlur = ready ? 22 : 0;
    ctx.fillStyle = 'rgba(8, 12, 10, 0.28)';
    ctx.beginPath();
    ctx.arc(x, y, radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.14)';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(x, y, radius, 0, Math.PI * 2);
    ctx.stroke();
    ctx.strokeStyle = tone;
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.arc(x, y, radius, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * clamp(progress, 0, 1));
    ctx.stroke();
    ctx.restore();

    drawUiGlyph(icon, x, y, 36, ready ? tone : '#f0f5f0');
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(keyLabel, x, y + 56);
    ctx.textAlign = 'left';
  }

  avatarBar(16, 14, 'hero', hero.hp, hero.maxHp, '#98e58f', 'HERO');
  avatarBar(16, 60, 'core', state.core.hp, CONFIG.core.maxHp, '#77e3ff', 'CORE');

  // 右上角资源面板：四格并列一行
  function drawChemLabel(x, cy, parts, tone) {
    // parts: [{text, sub}] — sub=true 表示下标（字号小、下移）
    ctx.textAlign = 'left';
    let cx = x;
    for (const part of parts) {
      if (part.sub) {
        ctx.font = 'bold 9px sans-serif';
        ctx.fillStyle = tone;
        ctx.fillText(part.text, cx, cy + 6);
        cx += ctx.measureText(part.text).width + 1;
      } else {
        ctx.font = 'bold 14px sans-serif';
        ctx.fillStyle = tone;
        ctx.fillText(part.text, cx, cy + 4);
        cx += ctx.measureText(part.text).width;
      }
    }
    return cx;
  }

  function resourcePill(x, y, w, h, icon, value, tone, chemParts) {
    ctx.fillStyle = 'rgba(7, 12, 10, 0.38)';
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = 'rgba(236,255,238,0.11)';
    ctx.strokeRect(x, y, w, h);
    const cy = y + h / 2;
    if (chemParts) {
      // 化学符号模式
      const labelEnd = drawChemLabel(x + 8, cy, chemParts, tone);
      ctx.fillStyle = tone;
      ctx.font = 'bold 13px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(String(value), labelEnd + 5, cy + 4);
    } else {
      drawUiGlyph(icon, x + 18, cy, 22, tone);
      ctx.fillStyle = tone;
      ctx.font = 'bold 14px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(String(value), x + 34, cy + 5);
    }
    ctx.textAlign = 'left';
  }

  const pillH = 36, pillGap = 4;
  const pillDefs = [
    { icon: 'coin',  value: state.coins,                          tone: '#ffe08b', w: 76 },
    { icon: 'heart', value: Math.max(hero.lives, 0),              tone: '#ff8e8e', w: 58 },
    { chem: [{text:'CO'},{text:'2',sub:true}],
      value: Math.floor(state.stats.co2) + ' kg',                 tone: '#7aefaa', w: 100 },
    { chem: [{text:'H'},{text:'2',sub:true},{text:'O'}],
      value: Math.floor(state.stats.toxin) + ' u',                tone: '#88ddff', w: 100 },
  ];
  // 从右边缘往左摆放
  let pillX = CONFIG.width - 10;
  for (let i = pillDefs.length - 1; i >= 0; i--) {
    const p = pillDefs[i];
    pillX -= p.w;
    resourcePill(pillX, 10, p.w, pillH, p.icon, p.value, p.tone, p.chem || null);
    if (i > 0) pillX -= pillGap;
  }

  const plantReady = 1 - clamp(hero.plantCd / CONFIG.hero.plantCd, 0, 1);
  const ultCdReady = 1 - clamp(hero.ultCd / CONFIG.hero.ultCd, 0, 1);
  const ultHpReady = clamp((hero.hp / hero.maxHp - 0.6) / 0.4, 0, 1);
  const ultReady = Math.min(ultCdReady, hero.hp / hero.maxHp >= 0.6 ? 1 : ultHpReady);
  skillOrb(62, 572, 'F', 'seed', plantReady, '#8fe09a');
  skillOrb(146, 572, 'K', 'burst', ultReady, '#ffd783');

  const shopW = 72, shopH = 28;
  const shopX = CONFIG.width - shopW - 14;
  const shopY = CONFIG.height - shopH - 14;
  const shopReady = canAffordShop || state.shopOpen;
  const shopR = shopH / 2;
  const pulse = 0.5 + 0.5 * Math.sin(performance.now() * 0.003);
  const pulseFast = 0.5 + 0.5 * Math.sin(performance.now() * 0.006);

  function drawShopCapsulePath() {
    ctx.beginPath();
    ctx.moveTo(shopX + shopR, shopY);
    ctx.arcTo(shopX + shopW, shopY, shopX + shopW, shopY + shopH, shopR);
    ctx.arcTo(shopX + shopW, shopY + shopH, shopX, shopY + shopH, shopR);
    ctx.arcTo(shopX, shopY + shopH, shopX, shopY, shopR);
    ctx.arcTo(shopX, shopY, shopX + shopW, shopY, shopR);
    ctx.closePath();
  }

  // 外层大光晕（渐变圆形叠加）
  if (shopReady) {
    const glowR = state.shopOpen ? 38 : 24 + pulse * 14;
    const glowCx = shopX + shopW / 2;
    const glowCy = shopY + shopH / 2;
    const glowAlpha = state.shopOpen ? 0.32 : 0.18 + pulse * 0.16;
    const outerGlow = ctx.createRadialGradient(glowCx, glowCy, 0, glowCx, glowCy, glowR + 18);
    outerGlow.addColorStop(0, `rgba(255,220,80,${glowAlpha})`);
    outerGlow.addColorStop(0.5, `rgba(255,180,40,${glowAlpha * 0.5})`);
    outerGlow.addColorStop(1, 'rgba(255,140,0,0)');
    ctx.fillStyle = outerGlow;
    ctx.beginPath();
    ctx.arc(glowCx, glowCy, glowR + 18, 0, Math.PI * 2);
    ctx.fill();
  }

  // 胶囊填充
  ctx.save();
  const grad = ctx.createLinearGradient(shopX, shopY, shopX, shopY + shopH);
  if (state.shopOpen) {
    grad.addColorStop(0, 'rgba(255,230,100,0.32)');
    grad.addColorStop(1, 'rgba(180,130,10,0.26)');
  } else {
    grad.addColorStop(0, 'rgba(22,32,26,0.88)');
    grad.addColorStop(1, 'rgba(10,16,12,0.78)');
  }
  ctx.fillStyle = grad;
  drawShopCapsulePath();
  ctx.fill();
  ctx.restore();

  // 边框光晕（shadowBlur on stroke）
  ctx.save();
  if (shopReady) {
    ctx.shadowColor = state.shopOpen ? '#ffe566' : `rgba(255,210,60,${0.7 + pulseFast * 0.3})`;
    ctx.shadowBlur = state.shopOpen ? 20 : 12 + pulse * 12;
  }
  ctx.strokeStyle = shopReady
    ? (state.shopOpen ? 'rgba(255,240,100,0.95)' : `rgba(255,${200 + Math.round(pulse * 50)},60,${0.75 + pulse * 0.25})`)
    : 'rgba(180,210,190,0.18)';
  ctx.lineWidth = state.shopOpen ? 2 : 1.5;
  drawShopCapsulePath();
  ctx.stroke();
  ctx.restore();

  // 图标 + 文字（带 shadowBlur 让字也发光）
  ctx.save();
  ctx.shadowColor = state.shopOpen ? '#ffe566' : `rgba(255,220,80,${0.5 + pulse * 0.4})`;
  ctx.shadowBlur = state.shopOpen ? 14 : 8 + pulse * 8;
  const iconX = shopX + 14;
  const iconY = shopY + shopH / 2;
  drawUiGlyph('shopcart', iconX, iconY, 22, shopReady ? (state.shopOpen ? '#ffe566' : '#ffd783') : '#a8c0b0');
  ctx.fillStyle = shopReady ? (state.shopOpen ? '#ffe566' : '#e8f5ec') : '#90a898';
  ctx.font = 'bold 12px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('SHOP', iconX + 12, iconY + 4);
  ctx.restore();

  if (shopReady && !state.shopOpen) {
    ctx.fillStyle = `rgba(255,220,80,${0.5 + pulse * 0.4})`;
    ctx.font = 'bold 9px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText('B', shopX + shopW - 6, shopY + shopH - 5);
  }
  ctx.textAlign = 'left';

  state.shopButtonRect = { x: shopX, y: shopY, w: shopW, h: shopH };
  state.loadoutButtonRect = null;

}

function drawWaveOverlay() {
  const wi = state.waveIntro;
  const wiMax = state.waveIntroMax || 2.0;
  const isBossWave = state.waveIndex >= 1;

  // break 倒计时条
  if (state.waveState === 'break' && state.phase === 'playing') {
    const pct = clamp(state.waveTimer / CONFIG.breakDuration, 0, 1);
    const barW = 320, barH = 10;
    const bx = CONFIG.width / 2 - barW / 2;
    const by = CONFIG.height - 48;
    // 背景
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(bx - 2, by - 2, barW + 4, barH + 4);
    // 进度
    const barColor = pct > 0.5 ? '#7aff8e' : pct > 0.25 ? '#ffe066' : '#ff6b6b';
    ctx.fillStyle = barColor;
    ctx.fillRect(bx, by, barW * pct, barH);
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.strokeRect(bx - 2, by - 2, barW + 4, barH + 4);
    // 倒计时数字
    const secs = Math.ceil(state.waveTimer);
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`Next wave in ${secs}s`, CONFIG.width / 2, by - 8);
    // 下一波提示
    const nextWave = state.waveIndex + 2;
    if (nextWave <= CONFIG.waves.length) {
      const warning = nextWave === 3 ? '⚠ BOSS INCOMING' : nextWave === 2 ? '⚠ MINIBOSS INCOMING' : '';
      if (warning) {
        const pulse = 0.6 + 0.4 * Math.sin(performance.now() * 0.005);
        ctx.fillStyle = `rgba(255,90,70,${pulse})`;
        ctx.font = 'bold 14px sans-serif';
        ctx.fillText(warning, CONFIG.width / 2, by - 26);
      }
    }
    ctx.textAlign = 'left';
    return;
  }

  // Wave intro 入场动画
  if (wi <= 0 || state.phase !== 'playing') return;
  const t = clamp(wi / wiMax, 0, 1); // 1=开始 0=结束
  const tIn = clamp((wiMax - wi) / 0.4, 0, 1);  // 0→1 淡入
